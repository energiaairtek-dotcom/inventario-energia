<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Airtek - Gestión de Almacén Energía</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; letter-spacing: -0.01em; text-transform: uppercase; }
        .shadow-premium { box-shadow: 0 20px 25px -5px rgba(0,0,0,0.05), 0 10px 10px -5px rgba(0,0,0,0.02); }
        .tab-content { animation: fadeIn 0.4s cubic-bezier(0.16,1,0.3,1); }
        @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .pulse-online { animation: pulse 2s cubic-bezier(0.4,0,0.6,1) infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
        input, select, textarea, option { text-transform: uppercase !important; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, signInWithEmailAndPassword, signOut, updatePassword, EmailAuthProvider, reauthenticateWithCredential } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, updateDoc, deleteDoc, collection, query, onSnapshot, addDoc, serverTimestamp, writeBatch, getDoc, limit, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        const myConfig = {
            apiKey: "AIzaSyDwaK4Z26RfqDwNvwdMqri08oEjwG9qymc",
            authDomain: "almacen-airtek.firebaseapp.com",
            projectId: "almacen-airtek",
            storageBucket: "almacen-airtek.firebasestorage.app",
            messagingSenderId: "934058211778",
            appId: "1:934058211778:web:6cc9d820c41fa90aa5fe5b"
        };
        window.__firebase_config_manual = JSON.stringify(myConfig);
        window.FirebaseSDK = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, signInWithEmailAndPassword, signOut, updatePassword, EmailAuthProvider, reauthenticateWithCredential, getFirestore, doc, setDoc, updateDoc, deleteDoc, collection, query, onSnapshot, addDoc, serverTimestamp, writeBatch, getDoc, limit, orderBy };
        window.dispatchEvent(new Event('firebase-ready'));
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const EnergyLogo = ({ className = "h-8 w-8" }) => (
            <svg viewBox="0 0 24 24" fill="none" className={className} xmlns="http://www.w3.org/2000/svg">
                <path d="M13 2L3 14H12L11 22L21 10H12L13 2Z" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
        );

        // ── Chip de filtro reutilizable ───────────────────────────────────────────────
        const FilterChip = ({ active, onClick, children, color = 'blue' }) => {
            const colors = {
                blue:    active ? 'bg-blue-600 text-white shadow-md'      : 'bg-white text-slate-400 border border-slate-200',
                orange:  active ? 'bg-orange-500 text-white shadow-md'    : 'bg-white text-slate-400 border border-slate-200',
                emerald: active ? 'bg-emerald-500 text-white shadow-md'   : 'bg-white text-slate-400 border border-slate-200',
                red:     active ? 'bg-red-500 text-white shadow-md'       : 'bg-white text-slate-400 border border-slate-200',
                slate:   active ? 'bg-slate-800 text-white shadow-md'     : 'bg-white text-slate-400 border border-slate-200',
            };
            return (
                <button type="button" onClick={onClick}
                    className={`px-4 py-2 rounded-xl font-black text-[9px] tracking-widest transition-all ${colors[color]}`}>
                    {children}
                </button>
            );
        };

        const App = () => {
            const [user, setUser]           = useState(null);
            const [loading, setLoading]     = useState(true);
            const [isCloud, setIsCloud]     = useState(false);
            const [inventory, setInventory] = useState([]);
            const [history, setHistory]     = useState([]);
            const [tools, setTools]         = useState([]);
            const [keys, setKeys]           = useState([]);
            const [activeTab, setActiveTab] = useState('inventory');
            const [adminSection, setAdminSection] = useState('material');

            // Despacho
            const [exitHeader, setExitHeader]       = useState({ tech: '', monitor: '', supervisor: '', description: '' });
            const [currentSearch, setCurrentSearch] = useState('');
            const [showSearchList, setShowSearchList] = useState(false);
            const [selectedItems, setSelectedItems] = useState([]);

            // Préstamos / Devoluciones
            const [loaningTool, setLoaningTool]   = useState(null);
            const [returningTool, setReturningTool] = useState(null);
            const [loaningKey, setLoaningKey]     = useState(null);
            const [loanData, setLoanData]         = useState({ tech: '', supervisor: '', monitor: '' });
            const [returnData, setReturnData]     = useState({ monitor: '' });

            // Filtros de herramientas y llaves
            const [toolsStatusFilter, setToolsStatusFilter] = useState('all');
            const [toolSearch, setToolSearch]               = useState('');
            const [keysStatusFilter, setKeysStatusFilter]   = useState('all');

            // Búsqueda en inventario
            const [inventorySearch, setInventorySearch] = useState('');

            // Filtros de bitácora
            const [histItemSearch, setHistItemSearch]         = useState('');
            const [histPersonSearch, setHistPersonSearch]     = useState('');
            const [histCategoryFilter, setHistCategoryFilter] = useState('all');   // all | material | herramienta | llave
            const [histDirectionFilter, setHistDirectionFilter] = useState('all'); // all | entrada | salida
            const [histDateFrom, setHistDateFrom]             = useState('');
            const [histDateTo, setHistDateTo]                 = useState('');

            // Modales
            const [editingItem, setEditingItem]   = useState(null);
            const [restockItem, setRestockItem]   = useState(null);
            const [restockQty, setRestockQty]     = useState('');
            const [restockResp, setRestockResp]   = useState('');
            const [isAdminMode, setIsAdminMode]   = useState(false);
            const [isLoaning, setIsLoaning]       = useState(false);

            // Maestro - nuevos items
            const [newItem, setNewItem]       = useState({ id: '', name: '', stock: '', min: 5, unit: 'PZA' });
            const [newTool, setNewTool]       = useState({ id: '', name: '', brand: '', serial: '' });
            const [newKeyItem, setNewKeyItem] = useState({ name: '' });

            // ── Login / Cambio de contraseña ──
            const [currentUser, setCurrentUser]   = useState(null); // { nombre, email, rol }
            const [loginModal, setLoginModal]       = useState(false);
            const [loginForm, setLoginForm]         = useState({ email: '', password: '' });
            const [loginError, setLoginError]       = useState('');
            const [loginLoading, setLoginLoading]   = useState(false);
            const [pwModal, setPwModal]             = useState(false);
            const [pwForm, setPwForm]               = useState({ current: '', newPw: '', confirm: '' });
            const [pwError, setPwError]             = useState('');
            const [pwSuccess, setPwSuccess]         = useState('');
            const [pwLoading, setPwLoading]         = useState(false);

            const dbRef  = useRef(null);
            const authRef = useRef(null);
            const appId  = typeof __app_id !== 'undefined' ? __app_id : 'airtek-energia-v1';
            const listaSupervisores = ["LUIS RAMOS", "DIEGO CHACÍN", "GUSTAVO RINCÓN"];
            const listadoNodos      = ["COMEDOR", "LAGO CARIBE", "SANTA CRUZ", "POMONA", "TUNAS", "SAN RAFAEL", "MENE GRANDE", "LABORATORIO"];

            // Permisos calculados por jerarquía
            const isMasterAdmin = currentUser && currentUser.rol === 'admin';
            const canManage     = currentUser && (isMasterAdmin || currentUser.rol === 'supervisor' || currentUser.rol === 'operador' || currentUser.rol === 'tecnico');
            const canEditMaster = currentUser && (isMasterAdmin || currentUser.rol === 'supervisor');
            const canDelete     = isMasterAdmin;

            // ── Firebase init ────────────────────────────────────────────────────────
            useEffect(() => {
                const init = async () => {
                    if (!window.FirebaseSDK) return;
                    const { initializeApp, getAuth, getFirestore, signInAnonymously, onAuthStateChanged, signInWithCustomToken, doc, getDoc, setDoc } = window.FirebaseSDK;
                    try {
                        const configStr = typeof __firebase_config !== 'undefined' ? __firebase_config : window.__firebase_config_manual;
                        const config = JSON.parse(configStr);
                        const app = initializeApp(config);
                        dbRef.current = getFirestore(app);
                        const auth = getAuth(app);
                        authRef.current = auth;
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                        for (const nodo of listadoNodos) {
                            const ref = doc(dbRef.current, 'artifacts', appId, 'public', 'data', 'keys_inventory', nodo);
                            const snap = await getDoc(ref);
                            if (!snap.exists()) {
                                await setDoc(ref, { name: nodo, status: 'DISPONIBLE', assignedTo: '', monitorTurno: '', lastMove: '' });
                            }
                        }
                        const unsub = onAuthStateChanged(auth, async (u) => {
                            if (u) {
                                setUser(u);
                                setIsCloud(true);
                                try {
                                    // 1. Intentar en airtek_users (nueva)
                                    const snapUnified = await getDoc(doc(dbRef.current, 'airtek_users', u.uid));
                                    let profile = null;

                                    if (snapUnified.exists()) {
                                        const d = snapUnified.data();
                                        profile = {
                                            nombre: d.name || d.nombre || u.email,
                                            email: u.email,
                                            rol: (d.apps && d.apps.almacen) || 'lector'
                                        };
                                    } 
                                    
                                    // 2. Si no hay rol o no existe, intentar en energy_users (legacy/actual)
                                    if (!profile || profile.rol === 'lector') {
                                        const snapLegacy = await getDoc(doc(dbRef.current, 'energy_users', u.uid));
                                        if (snapLegacy.exists()) {
                                            const dl = snapLegacy.data();
                                            profile = {
                                                nombre: dl.name || dl.nombre || profile?.nombre || u.email,
                                                email: u.email,
                                                rol: dl.role || dl.rol || 'lector'
                                            };
                                        }
                                    }

                                    if (profile) {
                                        setCurrentUser(profile);
                                        if (profile.rol === 'admin' || profile.rol === 'supervisor' || profile.rol === 'operador') {
                                            setIsAdminMode(true);
                                        }
                                    } else {
                                        setCurrentUser(null);
                                        setIsAdminMode(false);
                                    }
                                } catch(err) { console.warn("Error sync profile:", err); }
                            } else {
                                setCurrentUser(null);
                                setIsAdminMode(false);
                            }
                            setLoading(false);
                        });
                        return unsub;
                    } catch (e) { setLoading(false); }
                };
                window.addEventListener('firebase-ready', init);
                if (window.FirebaseSDK) init();
                return () => window.removeEventListener('firebase-ready', init);
            }, []);

            // ── Login con email/password (acceso a almacén) ──
            const handleLogin = async (e) => {
                e.preventDefault();
                setLoginError(''); setLoginLoading(true);
                const { signInWithEmailAndPassword, getDoc, doc: docFn } = window.FirebaseSDK;
                try {
                    const cred = await signInWithEmailAndPassword(authRef.current, loginForm.email.trim(), loginForm.password);
                    const uid = cred.user.uid;
                    let profile = null;
                    try {
                        const snap = await getDoc(docFn(dbRef.current, 'airtek_users', uid));
                        if (snap.exists()) {
                            const d = snap.data();
                            if (d.approved === false) {
                                await window.FirebaseSDK.signOut(authRef.current);
                                await window.FirebaseSDK.signInAnonymously(authRef.current);
                                setLoginError('Tu cuenta está pendiente de aprobación.'); setLoginLoading(false); return;
                            }
                            profile = { nombre: d.name || d.nombre || cred.user.email, email: d.email || cred.user.email, rol: (d.apps && d.apps.almacen) || 'operador' };
                        }
                    } catch(err) { console.warn('airtek_users lookup failed'); }
                    if (!profile) profile = { nombre: cred.user.email, email: cred.user.email, rol: 'operador' };
                    setCurrentUser(profile);
                    setLoginModal(false); setLoginForm({ email: '', password: '' });
                } catch(err) {
                    setLoginError(err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password'
                        ? 'Correo o contraseña incorrectos.'
                        : err.code === 'auth/too-many-requests' ? 'Demasiados intentos. Intente más tarde.' : 'Error al iniciar sesión.');
                }
                setLoginLoading(false);
            };

            const handleLogout = async () => {
                const { signOut: so, signInAnonymously } = window.FirebaseSDK;
                try { await so(authRef.current); await signInAnonymously(authRef.current); } catch(e) { console.error(e); }
                setCurrentUser(null);
            };

            const handleChangePassword = async (e) => {
                e.preventDefault();
                setPwError(''); setPwSuccess('');
                if (pwForm.newPw.length < 6) { setPwError('La nueva contraseña debe tener al menos 6 caracteres.'); return; }
                if (pwForm.newPw !== pwForm.confirm) { setPwError('Las contraseñas nuevas no coinciden.'); return; }
                setPwLoading(true);
                const { EmailAuthProvider, reauthenticateWithCredential, updatePassword } = window.FirebaseSDK;
                try {
                    const u = authRef.current.currentUser;
                    const credential = EmailAuthProvider.credential(u.email, pwForm.current);
                    await reauthenticateWithCredential(u, credential);
                    await updatePassword(u, pwForm.newPw);
                    setPwSuccess('¡Contraseña actualizada correctamente! El cambio aplica en todas las apps Airtek.');
                    setPwForm({ current: '', newPw: '', confirm: '' });
                } catch(err) {
                    setPwError(err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential'
                        ? 'La contraseña actual es incorrecta.'
                        : err.code === 'auth/weak-password' ? 'Contraseña muy débil (mín. 6 caracteres).'
                        : 'Error al cambiar la contraseña.');
                }
                setPwLoading(false);
            };

            // ── Listeners Firestore ──────────────────────────────────────────────────
            useEffect(() => {
                if (!user || !dbRef.current) return;
                const { collection, onSnapshot, query, limit, orderBy } = window.FirebaseSDK;
                const base = (col) => collection(dbRef.current, 'artifacts', appId, 'public', 'data', col);
                
                const u1 = onSnapshot(query(base('inventory'), limit(300)), (s) => setInventory(s.docs.map(d => ({ ...d.data(), docId: d.id }))));
                
                const qHist = query(base('history'), orderBy('timestamp', 'desc'), limit(400));
                const u2 = onSnapshot(qHist, (s) => {
                    const data = s.docs.map(d => ({ ...d.data(), id: d.id }));
                    setHistory(data);
                });
                
                const u3 = onSnapshot(query(base('tools_inventory'), limit(300)), (s) => setTools(s.docs.map(d => ({ ...d.data(), docId: d.id }))));
                const u4 = onSnapshot(query(base('keys_inventory'),  limit(300)), (s) => setKeys(s.docs.map(d => ({ ...d.data(), docId: d.id }))));
                return () => { u1(); u2(); u3(); u4(); };
            }, [user, appId]);

            // ── Memos ────────────────────────────────────────────────────────────────
            const filteredInventory = useMemo(() => {
                if (!inventorySearch) return inventory;
                const s = inventorySearch.toLowerCase();
                return inventory.filter(i => i.name.toLowerCase().includes(s) || i.id.toLowerCase().includes(s));
            }, [inventory, inventorySearch]);

            const filteredInventorySearch = useMemo(() => {
                if (!currentSearch) return [];
                const s = currentSearch.toLowerCase();
                return inventory.filter(i => i.name.toLowerCase().includes(s) || i.id.toLowerCase().includes(s)).slice(0, 5);
            }, [currentSearch, inventory]);

            const sortedAndFilteredTools = useMemo(() => {
                let list = [...tools].sort((a, b) => (a.name || '').localeCompare(b.name || ''));
                if (toolSearch) {
                    const s = toolSearch.toLowerCase();
                    list = list.filter(t => (t.name || '').toLowerCase().includes(s) || (t.id || '').toLowerCase().includes(s));
                }
                if (toolsStatusFilter !== 'all') list = list.filter(t => t.status === toolsStatusFilter);
                return list;
            }, [tools, toolSearch, toolsStatusFilter]);

            const filteredKeys = useMemo(() => {
                let list = [...keys].sort((a, b) => a.name.localeCompare(b.name));
                if (keysStatusFilter !== 'all') list = list.filter(k => k.status === keysStatusFilter);
                return list;
            }, [keys, keysStatusFilter]);

            // ── Bitácora: multi-filtro ────────────────────────────────────────────────
            const historyToShow = useMemo(() => {
                let list = [...history];

                // búsqueda por nombre de artículo
                if (histItemSearch) {
                    const s = histItemSearch.toLowerCase();
                    list = list.filter(h => (h.item || '').toLowerCase().includes(s));
                }
                // búsqueda por persona (técnico, responsable, supervisor)
                if (histPersonSearch) {
                    const s = histPersonSearch.toLowerCase();
                    list = list.filter(h => 
                        (h.tech || '').toLowerCase().includes(s) || 
                        (h.responsible || '').toLowerCase().includes(s) || 
                        (h.supervisor || '').toLowerCase().includes(s) ||
                        (h.monitor || '').toLowerCase().includes(s)
                    );
                }
                // categoría
                if (histCategoryFilter !== 'all') {
                    if (histCategoryFilter === 'material')    list = list.filter(h => h.type === 'ENTRADA' || h.type === 'SALIDA');
                    if (histCategoryFilter === 'herramienta') list = list.filter(h => h.type?.includes('HERRAMIENTA'));
                    if (histCategoryFilter === 'llave')       list = list.filter(h => h.type?.includes('LLAVE'));
                }
                // dirección
                if (histDirectionFilter !== 'all') {
                    if (histDirectionFilter === 'entrada') list = list.filter(h => h.type?.includes('ENTRADA') || h.type?.includes('DEVOLUCION'));
                    if (histDirectionFilter === 'salida')  list = list.filter(h => h.type?.includes('SALIDA')  || h.type?.includes('PRESTAMO'));
                }
                // rango de fechas usando timestamp.seconds
                if (histDateFrom) {
                    const from = new Date(histDateFrom).getTime() / 1000;
                    list = list.filter(h => (h.timestamp?.seconds || 0) >= from);
                }
                if (histDateTo) {
                    const to = new Date(histDateTo + 'T23:59:59').getTime() / 1000;
                    list = list.filter(h => (h.timestamp?.seconds || 0) <= to);
                }
                return list;
            }, [history, histItemSearch, histPersonSearch, histCategoryFilter, histDirectionFilter, histDateFrom, histDateTo]);

            // ── CRUD / Transacciones ─────────────────────────────────────────────────
            const deleteInventoryItem = async (docId, name) => {
                if (!canAdmin) return alert("SOLO ADMINISTRADORES PUEDEN ELIMINAR ARTÍCULOS");
                if (!confirm(`¿CONFIRMAR ELIMINACIÓN DE: ${name}?`)) return;
                const { doc, deleteDoc } = window.FirebaseSDK;
                await deleteDoc(doc(dbRef.current, 'artifacts', appId, 'public', 'data', 'inventory', docId)).catch(console.error);
            };
            const deleteKey = async (docId, name) => {
                if (!canAdmin) return alert("SOLO ADMINISTRADORES PUEDEN ELIMINAR LLAVES");
                if (!confirm(`¿ELIMINAR LLAVE DE: ${name}?`)) return;
                const { doc, deleteDoc } = window.FirebaseSDK;
                await deleteDoc(doc(dbRef.current, 'artifacts', appId, 'public', 'data', 'keys_inventory', docId)).catch(console.error);
            };
            const deleteTool = async (docId, name) => {
                if (!canAdmin) return alert("SOLO ADMINISTRADORES PUEDEN ELIMINAR HERRAMIENTAS");
                if (!confirm(`¿ELIMINAR HERRAMIENTA: ${name}?`)) return;
                const { doc, deleteDoc } = window.FirebaseSDK;
                await deleteDoc(doc(dbRef.current, 'artifacts', appId, 'public', 'data', 'tools_inventory', docId)).catch(console.error);
            };

            const handleToolLoan = async (e) => {
                e.preventDefault();
                if (!canManage) return alert("NO TIENES PERMISO PARA ESTA ACCIÓN");
                if (!loaningTool) return;
                const { doc, updateDoc, addDoc, collection, serverTimestamp } = window.FirebaseSDK;
                const dateStr = new Date().toLocaleString().toUpperCase();
                try {
                    await updateDoc(doc(dbRef.current, 'artifacts', appId, 'public', 'data', 'tools_inventory', loaningTool.docId), {
                        status: 'PRESTADO', assignedTo: loanData.tech.toUpperCase(),
                        supervisor: loanData.supervisor.toUpperCase(), monitorTurno: loanData.monitor.toUpperCase(), lastMove: dateStr
                    });
                    await addDoc(collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'history'), {
                        type: 'PRESTAMO_HERRAMIENTA', item: (loaningTool.name || 'S/N').toUpperCase(),
                        itemId: (loaningTool.id || 'S/ID').toUpperCase(), qty: 1,
                        tech: loanData.tech.toUpperCase(), supervisor: loanData.supervisor.toUpperCase(),
                        monitor: loanData.monitor.toUpperCase(), dateStr, timestamp: serverTimestamp()
                    });
                    setLoaningTool(null); setLoanData({ tech: '', supervisor: '', monitor: '' });
                } catch (err) { console.error(err); }
            };

            const handleToolReturnSubmit = async (e) => {
                e.preventDefault();
                if (!canManage) return alert("NO TIENES PERMISO PARA ESTA ACCIÓN");
                if (!returningTool) return;
                const { doc, updateDoc, addDoc, collection, serverTimestamp } = window.FirebaseSDK;
                const dateStr = new Date().toLocaleString().toUpperCase();
                try {
                    await updateDoc(doc(dbRef.current, 'artifacts', appId, 'public', 'data', 'tools_inventory', returningTool.docId), {
                        status: 'DISPONIBLE', assignedTo: null, supervisor: null, monitorTurno: null, lastMove: dateStr
                    });
                    await addDoc(collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'history'), {
                        type: 'DEVOLUCION_HERRAMIENTA', item: (returningTool.name || 'S/N').toUpperCase(),
                        itemId: (returningTool.id || 'S/ID').toUpperCase(), qty: 1,
                        tech: (returningTool.assignedTo || 'DESCONOCIDO').toUpperCase(),
                        monitor: returnData.monitor.toUpperCase(), dateStr, timestamp: serverTimestamp()
                    });
                    setReturningTool(null); setReturnData({ monitor: '' });
                } catch (err) { console.error(err); }
            };

            const handleKeyLoan = async (e) => {
                e.preventDefault();
                if (!canManage) return alert("NO TIENES PERMISO PARA ESTA ACCIÓN");
                if (!loaningKey) return;
                const { doc, updateDoc, addDoc, collection, serverTimestamp } = window.FirebaseSDK;
                const dateStr = new Date().toLocaleString().toUpperCase();
                try {
                    await updateDoc(doc(dbRef.current, 'artifacts', appId, 'public', 'data', 'keys_inventory', loaningKey.docId), {
                        status: 'PRESTADO', assignedTo: loanData.tech.toUpperCase(),
                        monitorTurno: loanData.monitor.toUpperCase(), lastMove: dateStr
                    });
                    await addDoc(collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'history'), {
                        type: 'PRESTAMO_LLAVE', item: `LLAVE NODO: ${loaningKey.name}`.toUpperCase(),
                        qty: 1, tech: loanData.tech.toUpperCase(), monitor: loanData.monitor.toUpperCase(),
                        dateStr, timestamp: serverTimestamp()
                    });
                    setLoaningKey(null); setLoanData({ tech: '', supervisor: '', monitor: '' });
                } catch (err) { console.error(err); }
            };

            const handleReturnKey = async (key) => {
                if (!canManage) return alert("NO TIENES PERMISO PARA ESTA ACCIÓN");
                if (!confirm(`¿CONFIRMAS LA DEVOLUCIÓN DE LA LLAVE: ${key.name}?`)) return;
                const { doc, updateDoc, addDoc, collection, serverTimestamp } = window.FirebaseSDK;
                const dateStr = new Date().toLocaleString().toUpperCase();
                try {
                    await updateDoc(doc(dbRef.current, 'artifacts', appId, 'public', 'data', 'keys_inventory', key.docId), {
                        status: 'DISPONIBLE', assignedTo: '', monitorTurno: '', lastMove: dateStr
                    });
                    await addDoc(collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'history'), {
                        type: 'DEVOLUCION_LLAVE', item: `LLAVE NODO: ${key.name}`.toUpperCase(),
                        qty: 1, tech: (key.assignedTo || 'DESCONOCIDO').toUpperCase(),
                        monitor: 'ALMACÉN', dateStr, timestamp: serverTimestamp()
                    });
                } catch (err) { console.error(err); }
            };

            const handleBulkExit = async (e) => {
                e.preventDefault();
                if (!canManage) return alert("ACCESO DENEGADO PARA ESTA OPERACIÓN");
                if (selectedItems.length === 0 || !exitHeader.monitor || !exitHeader.supervisor) return;
                const { doc, writeBatch, collection, serverTimestamp } = window.FirebaseSDK;
                const batch = writeBatch(dbRef.current);
                const dateStr = new Date().toLocaleString().toUpperCase();
                try {
                    selectedItems.forEach(item => {
                        batch.update(doc(dbRef.current, 'artifacts', appId, 'public', 'data', 'inventory', item.docId), { stock: item.stock - item.qty });
                        batch.set(doc(collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'history')), {
                            type: 'SALIDA', tech: exitHeader.tech.toUpperCase(), supervisor: exitHeader.supervisor.toUpperCase(),
                            monitor: exitHeader.monitor.toUpperCase(), description: exitHeader.description.toUpperCase(),
                            item: item.name.toUpperCase(), itemId: item.id.toUpperCase(), qty: item.qty, dateStr, timestamp: serverTimestamp()
                        });
                    });
                    await batch.commit();
                    setSelectedItems([]); setExitHeader({ tech: '', monitor: '', supervisor: '', description: '' });
                    setActiveTab('history');
                } catch (err) { console.error(err); }
            };

            const handleRestockSubmit = async (e) => {
                e.preventDefault();
                if (!canManage) return alert("NO TIENES PERMISO PARA ESTA ACCIÓN");
                if (!restockItem || !restockQty) return;
                const { doc, updateDoc, addDoc, collection, serverTimestamp } = window.FirebaseSDK;
                const qtyNum = Number(restockQty);
                const dateStr = new Date().toLocaleString().toUpperCase();
                try {
                    await updateDoc(doc(dbRef.current, 'artifacts', appId, 'public', 'data', 'inventory', restockItem.docId), { stock: restockItem.stock + qtyNum });
                    await addDoc(collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'history'), {
                        type: 'ENTRADA', item: restockItem.name.toUpperCase(), itemId: restockItem.id.toUpperCase(),
                        qty: qtyNum, responsible: restockResp.toUpperCase(), tech: 'ALMACÉN',
                        monitor: restockResp.toUpperCase(), description: 'REPOSICIÓN DE STOCK', dateStr, timestamp: serverTimestamp()
                    });
                    setRestockItem(null); setRestockQty(''); setRestockResp(''); setActiveTab('history');
                } catch (err) { console.error(err); }
            };

            const handleAddItem = async (e) => {
                e.preventDefault();
                if (!canManage) return alert("NO TIENES PERMISO PARA ESTA ACCIÓN");
                const { collection, addDoc, serverTimestamp } = window.FirebaseSDK;
                const dateStr = new Date().toLocaleString().toUpperCase();
                try {
                    await addDoc(collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'inventory'), {
                        id: newItem.id.toUpperCase(), name: newItem.name.toUpperCase(),
                        stock: Number(newItem.stock), min: Number(newItem.min), unit: newItem.unit.toUpperCase(), createdAt: serverTimestamp()
                    });
                    if (Number(newItem.stock) > 0) {
                        await addDoc(collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'history'), {
                            type: 'ENTRADA', item: newItem.name.toUpperCase(), itemId: newItem.id.toUpperCase(),
                            qty: Number(newItem.stock), responsible: 'ADMINISTRADOR', tech: 'ALMACÉN',
                            monitor: 'CREACIÓN', description: 'INVENTARIO INICIAL', dateStr, timestamp: serverTimestamp()
                        });
                    }
                    setNewItem({ id: '', name: '', stock: '', min: 5, unit: 'PZA' });
                    alert('Material registrado con éxito');
                } catch (err) { console.error(err); }
            };

            const handleAddTool = async (e) => {
                e.preventDefault();
                if (!canManage) return alert("NO TIENES PERMISO PARA ESTA ACCIÓN");
                const { collection, addDoc, serverTimestamp } = window.FirebaseSDK;
                try {
                    await addDoc(collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'tools_inventory'), {
                        id: newTool.id.toUpperCase(), name: newTool.name.toUpperCase(),
                        brand: newTool.brand.toUpperCase(), serial: newTool.serial.toUpperCase(),
                        status: 'DISPONIBLE', createdAt: serverTimestamp()
                    });
                    setNewTool({ id: '', name: '', brand: '', serial: '' });
                    alert('Herramienta registrada con éxito');
                } catch (err) { console.error(err); }
            };

            const handleAddKey = async (e) => {
                e.preventDefault();
                if (!canManage) return alert("NO TIENES PERMISO PARA ESTA ACCIÓN");
                const { doc, setDoc, serverTimestamp } = window.FirebaseSDK;
                const keyName = newKeyItem.name.toUpperCase();
                if (!keyName) return;
                try {
                    await setDoc(doc(dbRef.current, 'artifacts', appId, 'public', 'data', 'keys_inventory', keyName), {
                        name: keyName, status: 'DISPONIBLE', assignedTo: '', monitorTurno: '', lastMove: '', createdAt: serverTimestamp()
                    });
                    setNewKeyItem({ name: '' }); alert('Llave de nodo registrada');
                } catch (err) { console.error(err); }
            };

            const handleSaveEdit = async (e) => {
                e.preventDefault();
                if (!canManage) return alert("NO TIENES PERMISO PARA ESTA ACCIÓN");
                const { doc, updateDoc } = window.FirebaseSDK;
                try {
                    await updateDoc(doc(dbRef.current, 'artifacts', appId, 'public', 'data', 'inventory', editingItem.docId), {
                        name: editingItem.name.toUpperCase(), id: editingItem.id.toUpperCase(),
                        min: Number(editingItem.min), unit: editingItem.unit.toUpperCase()
                    });
                    setEditingItem(null);
                } catch (err) { console.error(err); }
            };

            const addItemToExitList = (item) => {
                if (selectedItems.find(si => si.id === item.id)) return;
                setSelectedItems([...selectedItems, { ...item, qty: 1 }]);
                setCurrentSearch(''); setShowSearchList(false);
            };
            const updateSelectedQty = (id, newQty) => setSelectedItems(selectedItems.map(i => i.id === id ? { ...i, qty: Math.max(1, Number(newQty)) } : i));

            // ── Exportaciones ────────────────────────────────────────────────────────
            const exportInventoryPDF = () => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                doc.setFontSize(18); doc.text("AIRTEK ENERGÍA - REPORTE DE INVENTARIO", 14, 20);
                doc.setFontSize(10); doc.text(`GENERADO: ${new Date().toLocaleString().toUpperCase()}`, 14, 28);
                const tableData = inventory.map(i => [i.id.toUpperCase(), i.name.toUpperCase(), i.stock, i.unit.toUpperCase(), i.stock <= i.min ? 'CRÍTICO' : 'OK']);
                doc.autoTable({ startY: 35, head: [['CÓDIGO', 'ARTÍCULO', 'STOCK', 'UNIDAD', 'ESTADO']], body: tableData, headStyles: { fillColor: [37, 99, 235] } });
                doc.save(`INVENTARIO_${new Date().toISOString().split('T')[0]}.pdf`);
            };

            // helper para construir filas de bitácora
            const buildHistRows = (data) => data.map(h => [
                (h.dateStr || '---').toUpperCase(),
                (h.item || '---').toUpperCase(),
                (h.type?.replace(/_/g, ' ') || 'MOVIMIENTO').toUpperCase(),
                (h.type?.includes('ENTRADA') || h.type?.includes('DEVOLUCION')) ? `+${h.qty}` : `-${h.qty}`,
                String(h.tech || h.responsible || '---').toUpperCase(),
                h.type?.includes('PRESTAMO') || h.type === 'SALIDA' ? String(h.supervisor || '---').toUpperCase() : '---',
                String(h.monitor || '---').toUpperCase(),
                String(h.description || '---').toUpperCase()
            ]);

            const exportHistoryPDF = () => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF('landscape');
                doc.setFontSize(14);
                doc.text('AIRTEK ENERGÍA - BITÁCORA DE MOVIMIENTOS', 14, 18);
                doc.setFontSize(8);
                doc.text(`GENERADO: ${new Date().toLocaleString().toUpperCase()} | REGISTROS: ${historyToShow.length}`, 14, 25);
                doc.autoTable({
                    startY: 30,
                    head: [['FECHA', 'ARTÍCULO', 'TIPO', 'CANT', 'RESPONSABLE', 'SUPERVISOR', 'MONITOREO', 'DESCRIPCIÓN']],
                    body: buildHistRows(historyToShow),
                    headStyles: { fillColor: [37, 99, 235] },
                    styles: { fontSize: 6.5 }
                });
                doc.save(`BITACORA_${new Date().toISOString().split('T')[0]}.pdf`);
            };

            const exportHistoryExcel = () => {
                const XLSX = window.XLSX;
                const header = ['FECHA', 'ARTÍCULO', 'TIPO', 'CANTIDAD', 'RESPONSABLE', 'SUPERVISOR', 'MONITOREO', 'DESCRIPCIÓN'];
                const rows   = buildHistRows(historyToShow);
                const wsData = [header, ...rows];
                const ws = XLSX.utils.aoa_to_sheet(wsData);
                // auto ancho de columnas
                ws['!cols'] = header.map((_, ci) => ({ wch: Math.max(...wsData.map(r => String(r[ci] || '').length), 10) + 2 }));
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, 'BITÁCORA');
                XLSX.writeFile(wb, `BITACORA_${new Date().toISOString().split('T')[0]}.xlsx`);
            };

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-white">
                    <div className="text-blue-600 animate-bounce mb-4"><EnergyLogo className="h-16 w-16" /></div>
                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">CONECTANDO...</p>
                </div>
            );

            return (
                <div className="min-h-screen pb-24 no-print uppercase font-bold text-slate-900">

                    {/* ── Modal Login ──────────────────────────────────────────────── */}
                    {loginModal && (
                        <div className="fixed inset-0 bg-slate-900/70 backdrop-blur-sm z-[200] flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2.5rem] p-8 max-w-sm w-full mx-4 shadow-2xl border border-slate-100 animate-in fade-in zoom-in duration-300">
                                <div className="text-center mb-6">
                                    <div className="w-16 h-16 bg-blue-50 rounded-3xl flex items-center justify-center mx-auto mb-4">
                                        <EnergyLogo className="text-blue-600 w-8 h-8" />
                                    </div>
                                    <h3 className="text-sm font-black text-slate-800 tracking-widest">ACCESO PERSONAL</h3>
                                    <p className="text-[10px] text-slate-400 font-bold mt-2">INGRESA TUS CREDENCIALES AIRTEK</p>
                                </div>
                                
                                <form onSubmit={handleLogin} className="space-y-4">
                                    <div className="space-y-1">
                                        <label className="text-[8px] font-black text-slate-400 ml-2">CORREO ELECTRÓNICO</label>
                                        <input required type="email" placeholder="EJ: USUARIO@AIRTEK.NET" 
                                            className="w-full p-4 bg-slate-50 rounded-2xl text-[11px] font-black outline-none border-2 border-transparent focus:border-blue-100 normal-case"
                                            style={{textTransform:'none'}}
                                            value={loginForm.email} onChange={e => setLoginForm({ ...loginForm, email: e.target.value })} />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[8px] font-black text-slate-400 ml-2">CONTRASEÑA</label>
                                        <input required type="password" placeholder="••••••••" 
                                            className="w-full p-4 bg-slate-50 rounded-2xl text-[11px] font-black outline-none border-2 border-transparent focus:border-blue-100"
                                            value={loginForm.password} onChange={e => setLoginForm({ ...loginForm, password: e.target.value })} />
                                    </div>
                                    {loginError && <p className="text-[9px] font-black text-red-500 text-center bg-red-50 py-2 rounded-xl border border-red-100">{loginError}</p>}
                                    
                                    <button disabled={loginLoading} className="w-full bg-blue-600 hover:bg-blue-700 text-white p-5 rounded-3xl font-black text-[11px] tracking-widest transition-all shadow-lg shadow-blue-200">
                                        {loginLoading ? 'VALIDANDO...' : 'ENTRAR AL SISTEMA'}
                                    </button>
                                    <button type="button" onClick={() => setLoginModal(false)} className="w-full text-[9px] font-black text-slate-300 hover:text-slate-500 transition-colors">CANCELAR</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* ── Modal Cambio de Contraseña ────────────────────────────────── */}
                    {pwModal && (
                        <div className="fixed inset-0 bg-slate-900/70 backdrop-blur-sm z-[200] flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-sm rounded-[2rem] p-8 shadow-2xl">
                                <div className="text-center mb-6">
                                    <div className="text-sm font-black text-slate-800">SEGURIDAD</div>
                                    <div className="text-[10px] text-slate-400 font-bold mt-1">{currentUser?.email}</div>
                                </div>
                                {pwSuccess ? (
                                    <div className="text-center">
                                        <div className="text-[11px] font-black text-emerald-600 bg-emerald-50 rounded-2xl p-4 mb-4">✓ {pwSuccess}</div>
                                        <button onClick={() => { setPwModal(false); setPwSuccess(''); }} className="w-full bg-slate-900 text-white p-4 rounded-2xl font-black text-[11px]">CERRAR</button>
                                    </div>
                                ) : (
                                    <form onSubmit={handleChangePassword} className="space-y-3">
                                        {[['current','CONTRASEÑA ACTUAL'],['newPw','NUEVA CONTRASEÑA'],['confirm','CONFIRMAR NUEVA']].map(([k,lbl]) => (
                                            <div key={k}>
                                                <label className="text-[9px] font-black text-slate-400 tracking-widest ml-1">{lbl}</label>
                                                <input required type="password"
                                                    className="w-full p-4 bg-slate-50 rounded-2xl text-[12px] font-black border-2 border-transparent focus:border-blue-500 outline-none mt-1"
                                                    value={pwForm[k]} onChange={e => setPwForm({ ...pwForm, [k]: e.target.value })}
                                                    placeholder="••••••••" style={{textTransform:'none'}} />
                                            </div>
                                        ))}
                                        {pwError && <div className="text-[10px] font-black text-red-500 bg-red-50 rounded-xl px-3 py-2">{pwError}</div>}
                                        <button type="submit" disabled={pwLoading} className="w-full bg-blue-600 disabled:bg-slate-200 text-white p-4 rounded-2xl font-black text-[11px] tracking-widest">
                                            {pwLoading ? 'ACTUALIZANDO...' : 'CAMBIAR CONTRASEÑA'}
                                        </button>
                                        <button type="button" onClick={() => { setPwModal(false); setPwError(''); setPwForm({ current: '', newPw: '', confirm: '' }); }}
                                            className="w-full text-[10px] text-slate-400 font-black py-2">CANCELAR</button>
                                    </form>
                                )}
                            </div>
                        </div>
                    )}

                    {/* ── Header ─────────────────────────────────────────────────────── */}
                    <header className="bg-white border-b border-slate-100 sticky top-0 z-50 px-6 py-4">
                        <div className="max-w-3xl mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <div className="bg-blue-600 text-white p-2 rounded-xl shadow-lg"><EnergyLogo className="h-7 w-7" /></div>
                                <div>
                                    <div className="flex items-center gap-2">
                                        <span className="text-lg font-black tracking-tighter">Airtek</span>
                                        <span className="text-[10px] font-black bg-blue-100 text-blue-600 px-1.5 py-0.5 rounded tracking-tighter">ALMACÉN</span>
                                    </div>
                                    <div className="flex items-center gap-1.5 mt-0.5">
                                        <span className={`w-1.5 h-1.5 rounded-full ${isCloud ? 'bg-emerald-500 pulse-online' : 'bg-red-500'}`}></span>
                                        <p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">{isCloud ? 'ONLINE' : 'OFFLINE'}</p>
                                    </div>
                                </div>
                            </div>
                            <div className="flex items-center gap-2">
                                {currentUser ? (
                                    <div className="flex items-center gap-3 bg-white/10 p-1.5 pr-4 rounded-full border border-white/10">
                                        <button onClick={() => setPwModal(true)} 
                                            className="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-[10px] font-black hover:bg-blue-500 transition-colors">
                                            {currentUser.nombre.charAt(0)}
                                        </button>
                                        <div className="flex flex-col">
                                            <span className="text-[9px] font-black text-slate-800 leading-none tracking-wide">{currentUser.nombre}</span>
                                            <span className="text-[7px] font-bold text-blue-500 uppercase mt-0.5 tracking-widest">{currentUser.rol}</span>
                                        </div>
                                        <button onClick={handleLogout} className="ml-2 text-slate-400 hover:text-red-400 transition-colors pt-0.5">
                                            <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                                        </button>
                                    </div>
                                ) : (
                                    <div className="flex items-center gap-2">
                                        <button onClick={() => setLoginModal(true)}
                                            className="text-[9px] px-5 py-2 rounded-full font-black tracking-widest bg-blue-600 text-white shadow-lg hover:bg-blue-500 transition-all border border-blue-400/30">
                                            ACCESO PERSONAL
                                        </button>
                                        {isAdminMode && (
                                            <div className="px-3 py-2 bg-slate-800 rounded-full text-[8px] font-black text-slate-400 tracking-widest border border-slate-700">
                                                MODO LECTURA
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        </div>
                    </header>

                    <div className="max-w-3xl mx-auto p-4 space-y-6 mt-4">

                        {/* ── Nav ────────────────────────────────────────────────────── */}
                        <nav className="flex gap-1.5 bg-white p-1.5 rounded-3xl shadow-premium border border-slate-100 overflow-x-auto no-scrollbar">
                            {[
                                { id: 'inventory', label: 'MATERIALES' }, { id: 'exit', label: 'DESPACHO' },
                                { id: 'tools', label: 'HERRAMIENTAS' }, { id: 'keys', label: 'LLAVES' },
                                { id: 'history', label: 'BITÁCORA' },
                                ...(canEditMaster ? [{ id: 'admin', label: 'MAESTRO' }] : [])
                            ].map(t => (
                                <button key={t.id} onClick={() => setActiveTab(t.id)}
                                    className={`flex-1 min-w-[90px] py-3 rounded-2xl font-black text-[10px] tracking-wider transition-all ${activeTab === t.id ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-400 hover:text-slate-700'}`}>
                                    {t.label}
                                </button>
                            ))}
                        </nav>

                        <main className="tab-content">

                            {/* ════════════════════════════════ MODALES ════════════════════════════════ */}
                            {loaningTool && (
                                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[100] flex items-center justify-center p-4">
                                    <form onSubmit={handleToolLoan} className="bg-white w-full max-w-md rounded-[2.5rem] p-8 space-y-4 shadow-2xl">
                                        <div className="text-center mb-4">
                                            <h3 className="text-sm font-black uppercase text-slate-800">PRESTAMO</h3>
                                            <p className="text-[11px] font-black text-slate-400 mt-1">{loaningTool.name}</p>
                                        </div>
                                        <input required className="w-full p-4 bg-slate-50 rounded-2xl text-[12px] font-black border-2 border-transparent focus:border-blue-500 outline-none" value={loanData.tech} onChange={e => setLoanData({ ...loanData, tech: e.target.value })} placeholder="TÉCNICO QUE RECIBE" />
                                        <select required className="w-full p-4 bg-slate-50 rounded-2xl text-[11px] font-black border-2 border-transparent focus:border-blue-500 outline-none" value={loanData.supervisor} onChange={e => setLoanData({ ...loanData, supervisor: e.target.value })}>
                                            <option value="">SUPERVISOR...</option>{listaSupervisores.map(s => <option key={s} value={s}>{s}</option>)}
                                        </select>
                                        <input required className="w-full p-4 bg-slate-50 rounded-2xl text-[12px] font-black border-2 border-transparent focus:border-blue-500 outline-none" value={loanData.monitor} onChange={e => setLoanData({ ...loanData, monitor: e.target.value })} placeholder="MONITOREO ENTREGA" />
                                        <div className="flex gap-3 pt-4">
                                            <button type="button" onClick={() => setLoaningTool(null)} className="flex-1 py-4 text-[10px] text-slate-400 font-black">CANCELAR</button>
                                            <button type="submit" className="flex-2 bg-orange-500 text-white px-8 py-4 rounded-2xl font-black text-[10px] shadow-lg">CONFIRMAR</button>
                                        </div>
                                    </form>
                                </div>
                            )}

                            {returningTool && (
                                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[100] flex items-center justify-center p-4">
                                    <form onSubmit={handleToolReturnSubmit} className="bg-white w-full max-w-md rounded-[2.5rem] p-8 space-y-4 shadow-2xl">
                                        <div className="text-center mb-4">
                                            <h3 className="text-sm font-black uppercase text-emerald-500">DEVOLUCIÓN</h3>
                                            <p className="text-[11px] font-black text-slate-800 mt-1">{returningTool.name}</p>
                                        </div>
                                        <p className="text-[10px] font-black text-slate-400 text-center">TÉCNICO: <span className="text-slate-900">{returningTool.assignedTo}</span></p>
                                        <input required className="w-full p-4 bg-emerald-50 rounded-2xl text-[12px] font-black border-2 border-emerald-100 focus:border-emerald-500 outline-none" value={returnData.monitor} onChange={e => setReturnData({ ...returnData, monitor: e.target.value })} placeholder="QUIÉN RECIBE (MONITOR)" />
                                        <div className="flex gap-3 pt-4">
                                            <button type="button" onClick={() => setReturningTool(null)} className="flex-1 py-4 text-[10px] text-slate-400 font-black">CANCELAR</button>
                                            <button type="submit" className="flex-2 bg-emerald-500 text-white px-8 py-4 rounded-2xl font-black text-[10px] shadow-lg">CONFIRMAR</button>
                                        </div>
                                    </form>
                                </div>
                            )}

                            {loaningKey && (
                                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[100] flex items-center justify-center p-4">
                                    <form onSubmit={handleKeyLoan} className="bg-white w-full max-w-md rounded-[2.5rem] p-8 space-y-4 shadow-2xl">
                                        <div className="text-center mb-4">
                                            <h3 className="text-sm font-black uppercase text-blue-600">ENTREGAR LLAVE DE NODO</h3>
                                            <p className="text-[11px] font-black text-slate-800 mt-1">{loaningKey.name}</p>
                                        </div>
                                        <input required className="w-full p-4 bg-slate-50 rounded-2xl text-[12px] font-black border-2 border-transparent focus:border-blue-500 outline-none" value={loanData.tech} onChange={e => setLoanData({ ...loanData, tech: e.target.value })} placeholder="TÉCNICO QUE RECIBE" />
                                        <input required className="w-full p-4 bg-slate-50 rounded-2xl text-[12px] font-black border-2 border-transparent focus:border-blue-500 outline-none" value={loanData.monitor} onChange={e => setLoanData({ ...loanData, monitor: e.target.value })} placeholder="NOMBRE MONITOREO" />
                                        <div className="flex gap-3 pt-4">
                                            <button type="button" onClick={() => setLoaningKey(null)} className="flex-1 py-4 text-[10px] text-slate-400 font-black">CANCELAR</button>
                                            <button type="submit" className="flex-2 bg-blue-600 text-white px-8 py-4 rounded-2xl font-black text-[10px] shadow-lg">CONFIRMAR</button>
                                        </div>
                                    </form>
                                </div>
                            )}

                            {restockItem && (
                                <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                                    <form onSubmit={handleRestockSubmit} className="bg-white w-full max-w-md rounded-[2.5rem] p-8 space-y-4 shadow-2xl">
                                        <div className="text-center font-black text-emerald-600 text-xs">REPONER: {restockItem.name}</div>
                                        <input required type="number" min="1" className="w-full p-4 bg-emerald-50 rounded-2xl text-[14px] font-black text-center outline-none" value={restockQty} onChange={e => setRestockQty(e.target.value)} placeholder="CANTIDAD" />
                                        <input required className="w-full p-4 bg-slate-50 rounded-2xl text-[11px] font-black outline-none" value={restockResp} onChange={e => setRestockResp(e.target.value)} placeholder="RESPONSABLE" />
                                        <div className="flex gap-3 pt-4">
                                            <button type="button" onClick={() => { setRestockItem(null); setRestockQty(''); }} className="flex-1 text-[10px] text-slate-400 font-black">CANCELAR</button>
                                            <button type="submit" className="flex-2 bg-emerald-500 text-white px-8 py-4 rounded-2xl font-black text-[10px]">REPOSICIÓN</button>
                                        </div>
                                    </form>
                                </div>
                            )}

                            {editingItem && (
                                <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                                    <form onSubmit={handleSaveEdit} className="bg-white w-full max-w-md rounded-[2.5rem] p-8 space-y-4 shadow-2xl">
                                        <div className="text-center font-black text-xs text-slate-800">EDITAR MATERIAL</div>
                                        <input required className="w-full p-4 bg-slate-50 rounded-2xl text-[11px] font-bold outline-none" value={editingItem.name} onChange={e => setEditingItem({ ...editingItem, name: e.target.value.toUpperCase() })} />
                                        <div className="grid grid-cols-2 gap-4">
                                            <input required className="w-full p-4 bg-slate-50 rounded-2xl text-[11px] font-bold outline-none" value={editingItem.id} onChange={e => setEditingItem({ ...editingItem, id: e.target.value.toUpperCase() })} />
                                            <input required type="number" className="w-full p-4 bg-slate-50 rounded-2xl text-[11px] font-bold outline-none" value={editingItem.min} onChange={e => setEditingItem({ ...editingItem, min: e.target.value })} placeholder="STOCK MÍNIMO" />
                                        </div>
                                        <input className="w-full p-4 bg-slate-50 rounded-2xl text-[11px] font-bold outline-none" value={editingItem.unit} onChange={e => setEditingItem({ ...editingItem, unit: e.target.value.toUpperCase() })} placeholder="UNIDAD" />
                                        <div className="flex gap-3 pt-2">
                                            <button type="button" onClick={() => setEditingItem(null)} className="flex-1 text-[10px] text-slate-400 font-black">CANCELAR</button>
                                            <button type="submit" className="flex-2 bg-blue-600 text-white px-8 py-4 rounded-2xl font-black text-[10px]">ACTUALIZAR</button>
                                        </div>
                                    </form>
                                </div>
                            )}

                            {/* ════════════════════════════════ INVENTARIO ════════════════════════════ */}
                            {activeTab === 'inventory' && (
                                <div className="space-y-4">
                                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 px-1">
                                        <h2 className="text-[10px] font-black text-slate-400 tracking-widest">EXISTENCIAS</h2>
                                        <div className="flex gap-2">
                                            <button onClick={exportInventoryPDF} className="bg-slate-900 text-white px-4 py-2 rounded-xl text-[9px] font-black tracking-widest">EXPORTAR PDF</button>
                                        </div>
                                    </div>

                                    {/* Búsqueda en inventario */}
                                    <div className="relative">
                                        <svg className="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                                        <input className="w-full pl-11 pr-4 p-4 bg-white rounded-2xl text-[11px] font-black shadow-sm border border-slate-100 outline-none"
                                            value={inventorySearch} onChange={e => setInventorySearch(e.target.value)} placeholder="BUSCAR MATERIAL..." />
                                    </div>

                                    <div className="space-y-3">
                                        {filteredInventory.length === 0 && (
                                            <div className="text-center p-10 bg-white rounded-[2rem] border-2 border-dashed border-slate-100">
                                                <p className="text-[10px] font-black text-slate-300">SIN RESULTADOS</p>
                                            </div>
                                        )}
                                        {filteredInventory.map(i => (
                                            <div key={i.docId} className="bg-white p-5 rounded-[2rem] flex flex-col sm:flex-row justify-between items-center shadow-sm border border-slate-100">
                                                <div className="flex items-center gap-4 w-full sm:w-auto">
                                                    {isAdminMode && canDelete && (
                                                        <button type="button" onClick={() => deleteInventoryItem(i.docId, i.name)} className="p-3 bg-red-50 text-red-400 rounded-xl hover:bg-red-100 shrink-0">
                                                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                                                        </button>
                                                    )}
                                                    {canEditMaster && (
                                                        <button type="button" onClick={() => setEditingItem(i)} className="p-3 bg-slate-50 text-slate-400 rounded-xl hover:text-blue-500 shrink-0">
                                                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
                                                        </button>
                                                    )}
                                                    <div className="flex flex-col">
                                                        <span className="font-black text-[13px] text-slate-800">{i.name}</span>
                                                        <span className="text-[9px] text-slate-400 font-mono font-bold">{i.id}</span>
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-3 mt-3 sm:mt-0">
                                                    <div className={`px-5 py-3 rounded-2xl text-center min-w-[80px] ${i.stock <= i.min ? 'bg-red-50' : 'bg-slate-50'}`}>
                                                        <div className={`font-black text-lg ${i.stock <= i.min ? 'text-red-500' : 'text-slate-900'}`}>{i.stock}</div>
                                                        <div className="text-[8px] text-slate-300 font-extrabold">{i.unit}</div>
                                                    </div>
                                                    {i.stock <= i.min && (
                                                        <span className="text-[8px] font-black text-red-500 bg-red-50 px-2 py-1 rounded-lg">STOCK CRÍTICO</span>
                                                    )}
                                                    <button type="button" onClick={() => setRestockItem(i)} className="px-5 py-3 bg-emerald-50 rounded-2xl font-black text-[10px] text-emerald-600 hover:bg-emerald-100 transition-colors">
                                                        REPONER
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* ════════════════════════════════ DESPACHO ══════════════════════════════ */}
                            {activeTab === 'exit' && (
                                <form onSubmit={handleBulkExit} className="bg-white p-8 rounded-[2.5rem] shadow-premium border border-slate-100 space-y-6">
                                    <div className="text-center"><h3 className="text-sm font-black text-slate-800">CARGA DE DESPACHO</h3></div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="space-y-1">
                                            <label className="text-[8px] text-slate-400 ml-2 font-black">TÉCNICO RESPONSABLE</label>
                                            <input required className="w-full p-4 bg-slate-50 rounded-2xl text-[11px] font-black outline-none border-2 border-transparent focus:border-blue-100" value={exitHeader.tech} onChange={e => setExitHeader({ ...exitHeader, tech: e.target.value.toUpperCase() })} placeholder="NOMBRE" />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[8px] text-slate-400 ml-2 font-black">TURNO MONITOREO</label>
                                            <input required className="w-full p-4 bg-slate-50 rounded-2xl text-[11px] font-black outline-none border-2 border-transparent focus:border-blue-100" value={exitHeader.monitor} onChange={e => setExitHeader({ ...exitHeader, monitor: e.target.value.toUpperCase() })} placeholder="QUIÉN DESPACHA" />
                                        </div>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[8px] text-slate-400 ml-2 font-black">SUPERVISOR AUTORIZA</label>
                                        <select required className="w-full p-4 bg-slate-50 rounded-2xl text-[11px] font-black border-2 border-transparent outline-none appearance-none" value={exitHeader.supervisor} onChange={e => setExitHeader({ ...exitHeader, supervisor: e.target.value })}>
                                            <option value="">SELECCIONAR...</option>
                                            {listaSupervisores.map(s => <option key={s} value={s}>{s}</option>)}
                                        </select>
                                    </div>
                                    <div className="relative">
                                        <label className="text-[8px] text-slate-400 ml-2 font-black">BUSCAR MATERIAL</label>
                                        <input className="w-full p-4 bg-slate-50 rounded-2xl text-[11px] font-black outline-none" value={currentSearch}
                                            onFocus={() => setShowSearchList(true)}
                                            onChange={e => { setCurrentSearch(e.target.value); setShowSearchList(true); }}
                                            placeholder="ESCRIBA PARA BUSCAR..." />
                                        {showSearchList && currentSearch && (
                                            <div className="absolute top-full left-0 right-0 mt-2 bg-white rounded-2xl shadow-2xl border z-50 overflow-hidden">
                                                {filteredInventorySearch.map(i => (
                                                    <div key={i.id} onClick={() => addItemToExitList(i)} className="p-4 hover:bg-blue-50 cursor-pointer flex justify-between items-center border-b last:border-0">
                                                        <div className="text-[11px] font-black">{i.name}</div>
                                                        <div className="text-[10px] text-blue-600">EN STOCK: {i.stock}</div>
                                                    </div>
                                                ))}
                                                {filteredInventorySearch.length === 0 && (
                                                    <div className="p-4 text-center text-[10px] font-black text-slate-300">SIN COINCIDENCIAS</div>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                    <div className="space-y-2">
                                        {selectedItems.map(item => (
                                            <div key={item.id} className="bg-slate-50 p-4 rounded-2xl flex items-center justify-between">
                                                <div className="text-[11px] font-black truncate max-w-[160px]">{item.name}</div>
                                                <div className="flex items-center gap-2">
                                                    <input type="number" className="w-16 p-2 bg-white rounded-xl text-[11px] font-black text-center border border-slate-200 outline-none" value={item.qty} onChange={e => updateSelectedQty(item.id, e.target.value)} min="1" />
                                                    <button type="button" onClick={() => setSelectedItems(selectedItems.filter(si => si.id !== item.id))} className="text-red-400 px-2 font-black text-lg">×</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[8px] text-slate-400 ml-2 font-black">NODO / OBSERVACIÓN</label>
                                        <input required className="w-full p-4 bg-slate-50 rounded-2xl text-[11px] font-black outline-none" value={exitHeader.description} onChange={e => setExitHeader({ ...exitHeader, description: e.target.value.toUpperCase() })} placeholder="DETALLES DE SALIDA" />
                                    </div>
                                    <button disabled={selectedItems.length === 0} className="w-full bg-blue-600 disabled:bg-slate-200 disabled:text-slate-400 text-white p-5 rounded-3xl font-black text-[11px] tracking-widest transition-colors">
                                        GENERAR DESPACHO {selectedItems.length > 0 && `(${selectedItems.length} ÍTEM${selectedItems.length > 1 ? 'S' : ''})`}
                                    </button>
                                </form>
                            )}

                            {/* ════════════════════════════════ HERRAMIENTAS ══════════════════════════ */}
                            {activeTab === 'tools' && (
                                <div className="space-y-4">
                                    <div className="px-1"><h2 className="text-[10px] font-black text-slate-400 tracking-widest">LISTADO DE HERRAMIENTAS</h2></div>

                                    {/* Buscador */}
                                    <div className="relative">
                                        <svg className="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                                        <input className="w-full pl-11 pr-4 p-4 bg-white rounded-2xl text-[11px] font-black shadow-sm border border-slate-100 outline-none"
                                            value={toolSearch} onChange={e => setToolSearch(e.target.value)} placeholder="BUSCAR POR NOMBRE O CÓDIGO..." />
                                    </div>

                                    {/* Filtro estado */}
                                    <div className="flex gap-2 flex-wrap">
                                        <FilterChip active={toolsStatusFilter === 'all'}        onClick={() => setToolsStatusFilter('all')}        color="slate">TODAS ({tools.length})</FilterChip>
                                        <FilterChip active={toolsStatusFilter === 'DISPONIBLE'} onClick={() => setToolsStatusFilter('DISPONIBLE')} color="emerald">DISPONIBLES ({tools.filter(t => t.status === 'DISPONIBLE').length})</FilterChip>
                                        <FilterChip active={toolsStatusFilter === 'PRESTADO'}   onClick={() => setToolsStatusFilter('PRESTADO')}   color="orange">PRESTADAS ({tools.filter(t => t.status === 'PRESTADO').length})</FilterChip>
                                    </div>

                                    <div className="space-y-3">
                                        {sortedAndFilteredTools.length === 0 && (
                                            <div className="text-center p-10 bg-white rounded-[2rem] border-2 border-dashed border-slate-100">
                                                <p className="text-[10px] font-black text-slate-300">SIN RESULTADOS</p>
                                            </div>
