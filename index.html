<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Airtek - Gestión de Consumibles Energía</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            letter-spacing: -0.01em;
            text-transform: uppercase;
        }
        
        .shadow-premium {
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
        }

        .tab-content {
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        input, select, textarea, option {
            text-transform: uppercase !important;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, updateDoc, deleteDoc, collection, query, onSnapshot, addDoc, serverTimestamp, writeBatch } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const myConfig = {
            apiKey: "AIzaSyDwaK4Z26RfqDwNvwdMqri08oEjwG9qymc",
            authDomain: "almacen-airtek.firebaseapp.com",
            projectId: "almacen-airtek",
            storageBucket: "almacen-airtek.firebasestorage.app",
            messagingSenderId: "934058211778",
            appId: "1:934058211778:web:6cc9d820c41fa90aa5fe5b"
        };

        window.__firebase_config_manual = JSON.stringify(myConfig);

        window.FirebaseSDK = {
            initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken,
            getFirestore, doc, setDoc, updateDoc, deleteDoc, collection, 
            query, onSnapshot, addDoc, serverTimestamp, writeBatch
        };
        window.dispatchEvent(new Event('firebase-ready'));
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const EnergyLogo = ({ className = "h-8 w-8" }) => (
            <svg viewBox="0 0 24 24" fill="none" className={className} xmlns="http://www.w3.org/2000/svg">
                <path d="M13 2L3 14H12L11 22L21 10H12L13 2Z" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
        );

        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [inventory, setInventory] = useState([]);
            const [history, setHistory] = useState([]);
            const [tools, setTools] = useState([]);
            const [activeTab, setActiveTab] = useState('inventory');
            const [exitHeader, setExitHeader] = useState({ tech: '', monitor: '', description: '' });
            const [currentSearch, setCurrentSearch] = useState('');
            const [toolSearch, setToolSearch] = useState('');
            const [showSearchList, setShowSearchList] = useState(false);
            const [selectedItems, setSelectedItems] = useState([]); 
            const [loaningTool, setLoaningTool] = useState(null);
            const [loanData, setLoanData] = useState({ tech: '', supervisor: '', monitor: '' });
            const [newTool, setNewTool] = useState({ id: '', name: '', brand: '', serial: '' });
            const [filterItemId, setFilterItemId] = useState('all');
            const [newItem, setNewItem] = useState({ id: '', name: '', stock: '', min: 5, unit: 'PZA' });
            const [editingItem, setEditingItem] = useState(null);
            const [restockItem, setRestockItem] = useState(null);
            const [restockQty, setRestockQty] = useState('');
            const [restockResp, setRestockResp] = useState('');
            const [isAdminMode, setIsAdminMode] = useState(false);

            const dbRef = useRef(null);
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'airtek-energia-v1';
            
            // Lista de monitores/personal de turno
            const monitoresAlmacen = ["LUIS RAMOS", "GUSTAVO RINCÓN", "DIEGO CHACÍN"];
            const supervisores = ["JUAN PEREZ", "MARIA GARCIA", "ALEXIS RIVAS", "OTRO"];

            useEffect(() => {
                const init = async () => {
                    if (!window.FirebaseSDK) return;
                    const { initializeApp, getAuth, getFirestore, signInAnonymously, onAuthStateChanged, signInWithCustomToken } = window.FirebaseSDK;
                    try {
                        const configStr = typeof __firebase_config !== 'undefined' ? __firebase_config : window.__firebase_config_manual;
                        const config = JSON.parse(configStr);
                        const app = initializeApp(config);
                        dbRef.current = getFirestore(app);
                        const auth = getAuth(app);
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                        const unsubscribe = onAuthStateChanged(auth, (u) => {
                            if (u) setUser(u);
                            setLoading(false);
                        });
                        return unsubscribe;
                    } catch (e) { setLoading(false); }
                };
                window.addEventListener('firebase-ready', init);
                if (window.FirebaseSDK) init();
                return () => window.removeEventListener('firebase-ready', init);
            }, []);

            useEffect(() => {
                if (!user || !dbRef.current) return;
                const { collection, onSnapshot } = window.FirebaseSDK;
                const invPath = collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'inventory');
                const histPath = collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'history');
                const toolsPath = collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'tools_inventory');
                
                const unsubInv = onSnapshot(invPath, (snap) => setInventory(snap.docs.map(d => ({ ...d.data(), docId: d.id }))));
                const unsubHist = onSnapshot(histPath, (snap) => setHistory(snap.docs.map(d => ({ ...d.data(), id: d.id })).sort((a,b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0))));
                const unsubTools = onSnapshot(toolsPath, (snap) => setTools(snap.docs.map(d => ({ ...d.data(), docId: d.id }))));
                
                return () => { unsubInv(); unsubHist(); unsubTools(); };
            }, [user, appId]);

            const sortedAndFilteredTools = useMemo(() => {
                let list = [...tools];
                list.sort((a, b) => a.name.localeCompare(b.name));
                if (toolSearch) {
                    const search = toolSearch.toLowerCase();
                    list = list.filter(t => t.name.toLowerCase().includes(search) || t.id.toLowerCase().includes(search));
                }
                return list;
            }, [tools, toolSearch]);

            const handleToolLoan = async (e) => {
                e.preventDefault();
                if (!loaningTool) return;
                const { doc, updateDoc, addDoc, collection, serverTimestamp } = window.FirebaseSDK;
                const dateStr = new Date().toLocaleString().toUpperCase();
                try {
                    await updateDoc(doc(dbRef.current, 'artifacts', appId, 'public', 'data', 'tools_inventory', loaningTool.docId), {
                        status: 'PRESTADO',
                        assignedTo: loanData.tech.toUpperCase(),
                        supervisor: loanData.supervisor.toUpperCase(),
                        monitorTurno: loanData.monitor.toUpperCase(),
                        lastMove: dateStr
                    });
                    await addDoc(collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'history'), {
                        type: 'PRESTAMO_HERRAMIENTA',
                        item: loaningTool.name.toUpperCase(),
                        itemId: loaningTool.id.toUpperCase(),
                        qty: 1,
                        tech: loanData.tech.toUpperCase(),
                        supervisor: loanData.supervisor.toUpperCase(),
                        monitor: loanData.monitor.toUpperCase(), // Quién entregó (Turno Monitoreo)
                        dateStr: dateStr,
                        timestamp: serverTimestamp()
                    });
                    setLoaningTool(null); 
                    setLoanData({ tech: '', supervisor: '', monitor: '' });
                } catch (err) { console.error(err); }
            };

            const handleToolReturn = async (tool) => {
                if(!confirm(`¿CONFIRMAS LA DEVOLUCIÓN DE: ${tool.name}?`)) return;
                const { doc, updateDoc, addDoc, collection, serverTimestamp } = window.FirebaseSDK;
                const dateStr = new Date().toLocaleString().toUpperCase();
                try {
                    await updateDoc(doc(dbRef.current, 'artifacts', appId, 'public', 'data', 'tools_inventory', tool.docId), {
                        status: 'DISPONIBLE',
                        assignedTo: null,
                        supervisor: null,
                        monitorTurno: null,
                        lastMove: dateStr
                    });
                    await addDoc(collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'history'), {
                        type: 'DEVOLUCION_HERRAMIENTA',
                        item: tool.name.toUpperCase(),
                        itemId: tool.id.toUpperCase(),
                        qty: 1,
                        tech: tool.assignedTo || 'DESCONOCIDO',
                        monitor: 'ALMACÉN',
                        dateStr: dateStr,
                        timestamp: serverTimestamp()
                    });
                } catch (err) { console.error(err); }
            };

            const exportHistoryPDF = (filteredData = history, titleSuffix = "COMPLETA") => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                doc.setFontSize(16);
                doc.text(`AIRTEK ENERGÍA - BITÁCORA ${titleSuffix}`, 14, 20);
                
                const tableData = filteredData.map(h => [
                    h.dateStr.toUpperCase(), 
                    h.item.toUpperCase(), 
                    (h.type === 'ENTRADA' || h.type === 'DEVOLUCION_HERRAMIENTA') ? `+${h.qty}` : `-${h.qty}`,
                    String(h.tech || h.responsible || '---').toUpperCase(),
                    h.type === 'PRESTAMO_HERRAMIENTA' ? String(h.supervisor || '---').toUpperCase() : '---',
                    String(h.monitor || '---').toUpperCase()
                ]);

                doc.autoTable({ 
                    startY: 35, 
                    head: [['FECHA', 'ARTÍCULO', 'CANT', 'RESPONSABLE', 'SUPERVISOR', 'ENTREGADO POR']], 
                    body: tableData, 
                    headStyles: { fillColor: [37, 99, 235] },
                    styles: { fontSize: 7 }
                });
                doc.save(`BITACORA_${titleSuffix}.pdf`);
            };

            const updateStock = async (docId, currentStock, mod) => {
                const { doc, updateDoc } = window.FirebaseSDK;
                try { await updateDoc(doc(dbRef.current, 'artifacts', appId, 'public', 'data', 'inventory', docId), { stock: Math.max(0, currentStock + mod) }); } catch (err) { console.error(err); }
            };

            const handleBulkExit = async (e) => {
                e.preventDefault();
                if (selectedItems.length === 0 || !exitHeader.monitor) return;
                const { doc, writeBatch, collection, serverTimestamp } = window.FirebaseSDK;
                const batch = writeBatch(dbRef.current);
                const dateStr = new Date().toLocaleString().toUpperCase();
                try {
                    selectedItems.forEach(item => {
                        const invDocRef = doc(dbRef.current, 'artifacts', appId, 'public', 'data', 'inventory', item.docId);
                        batch.update(invDocRef, { stock: item.stock - item.qty });
                        const histColRef = doc(collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'history'));
                        batch.set(histColRef, { 
                            type: 'SALIDA', 
                            tech: exitHeader.tech.toUpperCase(), 
                            monitor: exitHeader.monitor.toUpperCase(), 
                            description: exitHeader.description.toUpperCase(), 
                            item: item.name.toUpperCase(), 
                            itemId: item.id.toUpperCase(), 
                            qty: item.qty, 
                            dateStr: dateStr, 
                            timestamp: serverTimestamp() 
                        });
                    });
                    await batch.commit(); 
                    setSelectedItems([]); 
                    setExitHeader({ tech: '', monitor: '', description: '' }); 
                    setActiveTab('history');
                } catch (err) { console.error(err); }
            };

            const addItemToExitList = (item) => {
                if (selectedItems.find(si => si.id === item.id)) return;
                setSelectedItems([...selectedItems, { ...item, qty: 1 }]);
                setCurrentSearch('');
                setShowSearchList(false);
            };

            if (loading) return <div className="h-screen flex flex-col items-center justify-center bg-white"><div className="text-blue-600 animate-bounce mb-4"><EnergyLogo className="h-16 w-16" /></div><p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">CONECTANDO...</p></div>;

            return (
                <div className="min-h-screen pb-20 no-print uppercase font-bold text-slate-900">
                    <header className="bg-white border-b border-slate-100 sticky top-0 z-50 px-6 py-4">
                        <div className="max-w-3xl mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <div className="bg-blue-600 text-white p-2 rounded-xl shadow-lg"><EnergyLogo className="h-7 w-7" /></div>
                                <div>
                                    <div className="flex items-center gap-2"><span className="text-lg font-black tracking-tighter uppercase">Airtek</span><span className="text-[10px] font-black bg-blue-100 text-blue-600 px-1.5 py-0.5 rounded tracking-tighter">ENERGÍA</span></div>
                                    <div className="flex items-center gap-1.5 mt-0.5"><span className="w-1.5 h-1.5 rounded-full bg-emerald-500"></span><p className="text-[9px] font-bold text-slate-400 tracking-widest">SISTEMA ACTIVO</p></div>
                                </div>
                            </div>
                            <button onClick={() => setIsAdminMode(!isAdminMode)} className={`text-[9px] px-2 py-1 rounded-full font-black tracking-wider transition-colors ${isAdminMode ? 'bg-slate-800 text-white' : 'bg-slate-100 text-slate-400'}`}>{isAdminMode ? 'MODO EDITOR' : 'VISTA LECTURA'}</button>
                        </div>
                    </header>

                    <div className="max-w-3xl mx-auto p-4 space-y-6 mt-4">
                        <nav className="flex gap-1.5 bg-white p-1.5 rounded-3xl shadow-premium border border-slate-100 overflow-x-auto no-scrollbar">
                            {[
                                {id: 'inventory', label: 'INVENTARIO'}, {id: 'exit', label: 'DESPACHO'}, 
                                {id: 'tools', label: 'HERRAMIENTAS'}, {id: 'history', label: 'BITÁCORA'}
                            ].map(t => (
                                <button key={t.id} onClick={() => setActiveTab(t.id)} className={`flex-1 min-w-[90px] py-3 rounded-2xl font-black text-[10px] tracking-wider transition-all ${activeTab === t.id ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-400 hover:text-blue-50'}`}>{t.label}</button>
                            ))}
                        </nav>

                        <main className="tab-content">
                            {/* MODAL DE PRÉSTAMO CON NUEVOS CAMPOS */}
                            {loaningTool && (
                                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[100] flex items-center justify-center p-4">
                                    <form onSubmit={handleToolLoan} className="bg-white w-full max-w-md rounded-[2.5rem] p-8 space-y-4 shadow-2xl">
                                        <div className="text-center mb-4">
                                            <h3 className="text-sm font-black uppercase text-orange-500">PRÉSTAMO DE HERRAMIENTA</h3>
                                            <p className="text-[11px] font-black text-slate-800 mt-1">{loaningTool.name}</p>
                                        </div>
                                        
                                        <div className="space-y-4">
                                            <div>
                                                <label className="text-[9px] text-slate-400 ml-2 mb-1 block">TÉCNICO QUE RECIBE</label>
                                                <input required className="w-full p-4 bg-orange-50 rounded-2xl text-[12px] font-black border-2 border-orange-100 focus:border-orange-500 outline-none" value={loanData.tech} onChange={e=>setLoanData({...loanData, tech: e.target.value})} placeholder="NOMBRE DEL TÉCNICO" />
                                            </div>

                                            <div>
                                                <label className="text-[9px] text-slate-400 ml-2 mb-1 block">SUPERVISOR QUE AUTORIZA</label>
                                                <select required className="w-full p-4 bg-orange-50 rounded-2xl text-[11px] font-black border-2 border-transparent outline-none" value={loanData.supervisor} onChange={e=>setLoanData({...loanData, supervisor: e.target.value})}>
                                                    <option value="">SELECCIONE SUPERVISOR...</option>
                                                    {supervisores.map(s => <option key={s} value={s}>{s}</option>)}
                                                </select>
                                            </div>

                                            <div>
                                                <label className="text-[9px] text-slate-400 ml-2 mb-1 block">TURNO MONITOREO (ENTREGA)</label>
                                                <select required className="w-full p-4 bg-orange-50 rounded-2xl text-[11px] font-black border-2 border-transparent outline-none" value={loanData.monitor} onChange={e=>setLoanData({...loanData, monitor: e.target.value})}>
                                                    <option value="">QUIÉN ESTÁ DE TURNO...</option>
                                                    {monitoresAlmacen.map(m => <option key={m} value={m}>{m}</option>)}
                                                </select>
                                            </div>
                                        </div>

                                        <div className="flex gap-3 pt-6">
                                            <button type="button" onClick={()=>setLoaningTool(null)} className="flex-1 py-4 text-[10px] text-slate-400 font-black">CANCELAR</button>
                                            <button type="submit" className="flex-2 bg-orange-500 text-white px-8 py-4 rounded-2xl font-black text-[10px] uppercase shadow-lg shadow-orange-200">CONFIRMAR ENTREGA</button>
                                        </div>
                                    </form>
                                </div>
                            )}

                            {activeTab === 'inventory' && (
                                <div className="space-y-3">
                                    <div className="flex justify-between items-center px-4"><h2 className="text-[10px] font-black text-slate-400 tracking-widest">STOCK ACTUAL</h2></div>
                                    {inventory.map(i => (
                                        <div key={i.docId} className="bg-white p-5 rounded-[2rem] flex flex-col sm:flex-row justify-between items-center shadow-sm border border-slate-100">
                                            <div className="flex items-center gap-4 w-full sm:w-auto">
                                                <div className="flex flex-col"><span className="font-black text-[13px] text-slate-800">{i.name}</span><span className="text-[9px] text-slate-400 font-mono font-bold">{i.id}</span></div>
                                            </div>
                                            <div className="flex items-center gap-4 bg-slate-50 p-1.5 rounded-2xl mt-3 sm:mt-0">
                                                <button onClick={() => updateStock(i.docId, i.stock, -1)} className="w-9 h-9 flex items-center justify-center bg-white rounded-xl text-slate-400">-</button>
                                                <div className="px-4 text-center min-w-[70px]"><div className={`font-black text-lg ${i.stock <= i.min ? 'text-red-500' : 'text-slate-900'}`}>{i.stock}</div><div className="text-[8px] text-slate-300 font-extrabold">{i.unit}</div></div>
                                                <button onClick={() => updateStock(i.docId, i.stock, 1)} className="w-9 h-9 flex items-center justify-center bg-white rounded-xl text-slate-400">+</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {activeTab === 'tools' && (
                                <div className="space-y-6">
                                    <div className="flex flex-col gap-4 px-4">
                                        <h2 className="text-[10px] font-black text-slate-400 tracking-widest uppercase">CONTROL HERRAMIENTAS</h2>
                                        <div className="relative">
                                            <input className="w-full p-4 bg-white rounded-2xl text-[11px] font-black shadow-sm border border-slate-100 outline-none uppercase" value={toolSearch} onChange={e => setToolSearch(e.target.value)} placeholder="BUSCAR HERRAMIENTA O CÓDIGO..." />
                                        </div>
                                    </div>

                                    <div className="space-y-3">
                                        {sortedAndFilteredTools.map(t => (
                                            <div key={t.docId} className={`bg-white p-5 rounded-[2rem] flex flex-col sm:flex-row justify-between items-center shadow-sm border ${t.status === 'PRESTADO' ? 'border-orange-200 bg-orange-50/30' : 'border-slate-100'}`}>
                                                <div className="flex items-center gap-4">
                                                    <div className={`p-3 rounded-xl ${t.status === 'PRESTADO' ? 'bg-orange-100 text-orange-500' : 'bg-emerald-100 text-emerald-500'}`}><EnergyLogo className="w-5 h-5" /></div>
                                                    <div className="flex flex-col">
                                                        <span className="font-black text-[13px] text-slate-800">{t.name}</span>
                                                        <span className="text-[9px] text-slate-400 font-mono">{t.id}</span>
                                                        {t.status === 'PRESTADO' && (
                                                            <div className="mt-1 space-y-0.5">
                                                                <div className="text-[8px] font-black text-orange-600">TÉCNICO: {t.assignedTo}</div>
                                                                <div className="text-[8px] font-black text-slate-500">AUTORIZA: {t.supervisor}</div>
                                                                <div className="text-[8px] font-black text-slate-400">ENTREGÓ: {t.monitorTurno}</div>
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-2 mt-4 sm:mt-0">
                                                    {t.status === 'DISPONIBLE' ? 
                                                        <button onClick={() => setLoaningTool(t)} className="px-6 py-3 bg-slate-900 text-white rounded-xl text-[10px] uppercase tracking-widest font-black">PRESTAR</button> : 
                                                        <button onClick={() => handleToolReturn(t)} className="px-6 py-3 bg-white border-2 border-orange-500 text-orange-500 rounded-xl text-[10px] uppercase tracking-widest font-black">RECIBIR DEVOLUCIÓN</button>
                                                    }
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {activeTab === 'exit' && (
                                <form onSubmit={handleBulkExit} className="bg-white p-8 rounded-[2.5rem] shadow-premium border border-slate-100 space-y-6">
                                    <div className="text-center"><h3 className="text-sm font-black text-slate-800">DESPACHO MATERIALES</h3></div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <input required className="w-full p-4 bg-slate-50 rounded-2xl text-[11px] font-black outline-none" value={exitHeader.tech} onChange={e=>setExitHeader({...exitHeader, tech: e.target.value.toUpperCase()})} placeholder="TÉCNICO" />
                                        <select required className="w-full p-4 bg-slate-50 rounded-2xl text-[11px] font-black outline-none" value={exitHeader.monitor} onChange={e=>setExitHeader({...exitHeader, monitor: e.target.value})}>
                                            <option value="">PERSONAL DE TURNO...</option>
                                            {monitoresAlmacen.map(m => <option key={m} value={m}>{m}</option>)}
                                        </select>
                                    </div>
                                    <div className="relative">
                                        <input className="w-full p-4 bg-slate-50 rounded-2xl text-[11px] font-black outline-none" value={currentSearch} onFocus={() => setShowSearchList(true)} onChange={e => {setCurrentSearch(e.target.value); setShowSearchList(true);}} placeholder="BUSCAR MATERIAL..." />
                                        {showSearchList && (
                                            <div className="absolute top-full left-0 right-0 mt-2 bg-white rounded-2xl shadow-2xl border z-50 overflow-hidden">
                                                {inventory.filter(i => i.name.toLowerCase().includes(currentSearch.toLowerCase())).slice(0, 5).map(i => (
                                                    <div key={i.id} onClick={() => addItemToExitList(i)} className="p-4 hover:bg-blue-50 cursor-pointer flex justify-between items-center border-b last:border-0">
                                                        <div className="text-[11px] font-black">{i.name}</div>
                                                        <div className="text-[10px] text-blue-600">STOCK: {i.stock}</div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                    <div className="space-y-2">
                                        {selectedItems.map(item => (
                                            <div key={item.id} className="bg-slate-50 p-4 rounded-2xl flex items-center justify-between">
                                                <div className="text-[11px] font-black truncate max-w-[150px]">{item.name}</div>
                                                <div className="flex items-center gap-2">
                                                    <input type="number" className="w-16 p-2 bg-white rounded-xl text-[11px] font-black text-center" value={item.qty} onChange={e => setSelectedItems(selectedItems.map(si => si.id === item.id ? {...si, qty: Number(e.target.value)} : si))} min="1" />
                                                    <button type="button" onClick={() => setSelectedItems(selectedItems.filter(si => si.id !== item.id))} className="text-red-400 px-2 font-black">×</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <button disabled={selectedItems.length === 0} className="w-full bg-blue-600 disabled:bg-slate-200 text-white p-5 rounded-3xl font-black text-[11px]">PROCESAR DESPACHO</button>
                                </form>
                            )}

                            {activeTab === 'history' && (
                                <div className="space-y-4">
                                    <div className="bg-white p-6 rounded-[2.5rem] shadow-sm flex justify-between items-center">
                                        <h2 className="text-[10px] font-black text-slate-400 tracking-widest uppercase">HISTORIAL DE MOVIMIENTOS</h2>
                                        <button onClick={() => exportHistoryPDF(history)} className="bg-slate-900 text-white px-4 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest">DESCARGAR PDF</button>
                                    </div>
                                    <div className="space-y-2.5">
                                        {history.map(h => {
                                            const isTool = h.type.includes('HERRAMIENTA');
                                            const isEntry = h.type === 'ENTRADA' || h.type === 'DEVOLUCION_HERRAMIENTA';
                                            return (
                                                <div key={h.id} className={`bg-white p-5 rounded-[2.2rem] flex flex-col sm:flex-row justify-between items-center shadow-sm border-l-4 ${isEntry ? 'border-l-emerald-500' : 'border-l-red-500'} gap-3`}>
                                                    <div>
                                                        <div className="font-black text-[12px] text-slate-800">{h.item}</div>
                                                        <div className="text-[8px] font-black text-slate-400 uppercase mt-1">
                                                            TIPO: {h.type.replace('_',' ')} | POR: <span className="text-slate-900">{h.tech || h.responsible}</span>
                                                        </div>
                                                        {h.supervisor && <div className="text-[8px] font-black text-orange-500 mt-0.5">AUTORIZÓ: {h.supervisor}</div>}
                                                        <div className="text-[8px] font-black text-blue-600 mt-0.5">TURNISTA: {h.monitor}</div>
                                                    </div>
                                                    <div className="text-right shrink-0">
                                                        <div className={`font-black text-sm ${isEntry ? 'text-emerald-600' : 'text-red-600'}`}>{isEntry ? '+' : '-'}{h.qty}</div>
                                                        <div className="text-[8px] text-slate-300 font-black mt-0.5">{h.dateStr}</div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
