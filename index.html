                                        )}
                                        {sortedAndFilteredTools.map(t => (
                                            <div key={t.docId} className={`bg-white p-5 rounded-[2rem] flex flex-col sm:flex-row justify-between items-center shadow-sm border ${t.status === 'PRESTADO' ? 'border-orange-200 bg-orange-50/30' : 'border-slate-100'}`}>
                                                <div className="flex items-center gap-4">
                                                    <div className={`p-3 rounded-xl ${t.status === 'PRESTADO' ? 'bg-orange-100 text-orange-500' : 'bg-emerald-100 text-emerald-500'}`}>
                                                        <EnergyLogo className="w-5 h-5" />
                                                    </div>
                                                    <div className="flex flex-col">
                                                        <span className="font-black text-[13px] text-slate-800">{t.name}</span>
                                                        <span className="text-[9px] text-slate-400 font-mono">{t.id}</span>
                                                        {t.status === 'PRESTADO' && (
                                                            <div className="mt-1 space-y-0.5">
                                                                <span className="text-[9px] font-black text-orange-500">ASIGNADO A: {t.assignedTo}</span>
                                                                {t.supervisor && <div className="text-[8px] text-slate-400 font-bold">SUPERVISOR: {t.supervisor}</div>}
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-2 mt-3 sm:mt-0">
                                                    {t.status === 'DISPONIBLE'
                                                        ? <button type="button" onClick={() => setLoaningTool(t)} className="px-6 py-3 bg-slate-900 text-white rounded-xl text-[10px] font-black">PRESTAR</button>
                                                        : <button type="button" onClick={() => setReturningTool(t)} className="px-6 py-3 bg-white border-2 border-orange-500 text-orange-500 rounded-xl text-[10px] font-black">DEVOLVER</button>
                                                    }
                                                    {isAdminMode && canDelete && <button type="button" onClick={() => deleteTool(t.docId, t.name)} className="p-3 bg-red-50 text-red-400 rounded-xl hover:bg-red-100">×</button>}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* ════════════════════════════════ LLAVES ════════════════════════════════ */}
                            {activeTab === 'keys' && (
                                <div className="space-y-4">
                                    <div className="px-1"><h2 className="text-[10px] font-black text-slate-400 tracking-widest">LLAVES DE NODOS</h2></div>

                                    {/* Filtro estado */}
                                    <div className="flex gap-2 flex-wrap">
                                        <FilterChip active={keysStatusFilter === 'all'}        onClick={() => setKeysStatusFilter('all')}        color="slate">TODAS ({keys.length})</FilterChip>
                                        <FilterChip active={keysStatusFilter === 'DISPONIBLE'} onClick={() => setKeysStatusFilter('DISPONIBLE')} color="emerald">DISPONIBLES ({keys.filter(k => k.status === 'DISPONIBLE').length})</FilterChip>
                                        <FilterChip active={keysStatusFilter === 'PRESTADO'}   onClick={() => setKeysStatusFilter('PRESTADO')}   color="blue">PRESTADAS ({keys.filter(k => k.status === 'PRESTADO').length})</FilterChip>
                                    </div>

                                    <div className="space-y-3">
                                        {filteredKeys.length === 0 && (
                                            <div className="text-center p-10 bg-white rounded-[2rem] border-2 border-dashed border-slate-100">
                                                <p className="text-[10px] font-black text-slate-300">SIN RESULTADOS</p>
                                            </div>
                                        )}
                                        {filteredKeys.map(k => (
                                            <div key={k.docId} className={`bg-white p-5 rounded-[2rem] shadow-sm border flex flex-col sm:flex-row justify-between items-center gap-4 ${k.status === 'PRESTADO' ? 'border-blue-200 bg-blue-50/20' : 'border-slate-100'}`}>
                                                <div className="flex items-center gap-4 w-full">
                                                    <div className={`p-4 rounded-2xl shrink-0 ${k.status === 'PRESTADO' ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-400'}`}>
                                                        <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3m-3-3l-2.5-2.5" /></svg>
                                                    </div>
                                                    <div>
                                                        <div className="text-[13px] font-black">{k.name}</div>
                                                        {k.status === 'PRESTADO' ? (
                                                            <div className="mt-1 space-y-0.5">
                                                                <div className="text-[9px] text-blue-600 font-black">EN POSESIÓN DE: {k.assignedTo}</div>
                                                                <div className="text-[8px] text-slate-400 font-bold">ENTREGADO POR: {k.monitorTurno}</div>
                                                            </div>
                                                        ) : (
                                                            <div className="text-[9px] text-emerald-500 font-black tracking-widest">DISPONIBLE</div>
                                                        )}
                                                    </div>
                                                </div>
                                                <div className="shrink-0 w-full sm:w-auto flex items-center gap-2">
                                                    {k.status === 'DISPONIBLE'
                                                        ? <button type="button" onClick={() => setLoaningKey(k)} className="w-full sm:w-auto px-6 py-3 bg-slate-900 text-white rounded-xl text-[10px] font-black">ENTREGAR</button>
                                                        : <button type="button" onClick={() => handleReturnKey(k)} className="w-full sm:w-auto px-6 py-3 bg-white border-2 border-blue-600 text-blue-600 rounded-xl text-[10px] font-black">RECIBIR LLAVE</button>
                                                    }
                                                    {isAdminMode && canDelete && <button type="button" onClick={() => deleteKey(k.docId, k.name)} className="p-3 bg-red-50 text-red-400 rounded-xl hover:bg-red-100">×</button>}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* ════════════════════════════════ BITÁCORA ══════════════════════════════ */}
                            {activeTab === 'history' && (
                                <div className="space-y-4">

                                    {/* Panel de filtros */}
                                    <div className="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100 space-y-5">
                                        <h3 className="text-[9px] font-black text-blue-600 tracking-widest">FILTROS DE BITÁCORA</h3>

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            {/* Búsqueda por nombre */}
                                            <div className="relative">
                                                <label className="text-[8px] font-black text-slate-400 ml-1">BUSCAR ARTÍCULO</label>
                                                <div className="relative mt-1">
                                                    <svg className="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                                                    <input className="w-full pl-11 pr-4 py-3 bg-slate-50 rounded-xl text-[11px] font-black outline-none border-2 border-transparent focus:border-blue-100"
                                                        value={histItemSearch} onChange={e => setHistItemSearch(e.target.value.toUpperCase())} placeholder="NOMBRE DEL ARTÍCULO..." />
                                                    {histItemSearch && <button type="button" onClick={() => setHistItemSearch('')} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-300 hover:text-slate-500 font-black text-lg">×</button>}
                                                </div>
                                            </div>

                                            {/* Búsqueda por Persona */}
                                            <div className="relative">
                                                <label className="text-[8px] font-black text-slate-400 ml-1">BUSCAR PERSONA / TÉCNICO</label>
                                                <div className="relative mt-1">
                                                    <svg className="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                                                    <input className="w-full pl-11 pr-4 py-3 bg-slate-50 rounded-xl text-[11px] font-black outline-none border-2 border-transparent focus:border-blue-100"
                                                        value={histPersonSearch} onChange={e => setHistPersonSearch(e.target.value.toUpperCase())} placeholder="TÉCNICO, RESPONSABLE..." />
                                                    {histPersonSearch && <button type="button" onClick={() => setHistPersonSearch('')} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-300 hover:text-slate-500 font-black text-lg">×</button>}
                                                </div>
                                            </div>
                                        </div>

                                        {/* Filtro categoría */}
                                        <div>
                                            <label className="text-[8px] font-black text-slate-400 ml-1">CATEGORÍA</label>
                                            <div className="flex gap-2 flex-wrap mt-2">
                                                <FilterChip active={histCategoryFilter === 'all'}         onClick={() => setHistCategoryFilter('all')}         color="slate">TODOS</FilterChip>
                                                <FilterChip active={histCategoryFilter === 'material'}    onClick={() => setHistCategoryFilter('material')}    color="blue">MATERIAL</FilterChip>
                                                <FilterChip active={histCategoryFilter === 'herramienta'} onClick={() => setHistCategoryFilter('herramienta')} color="orange">HERRAMIENTA</FilterChip>
                                                <FilterChip active={histCategoryFilter === 'llave'}       onClick={() => setHistCategoryFilter('llave')}       color="blue">LLAVE</FilterChip>
                                            </div>
                                        </div>

                                        {/* Filtro dirección */}
                                        <div>
                                            <label className="text-[8px] font-black text-slate-400 ml-1">MOVIMIENTO</label>
                                            <div className="flex gap-2 flex-wrap mt-2">
                                                <FilterChip active={histDirectionFilter === 'all'}    onClick={() => setHistDirectionFilter('all')}    color="slate">TODOS</FilterChip>
                                                <FilterChip active={histDirectionFilter === 'entrada'} onClick={() => setHistDirectionFilter('entrada')} color="emerald">ENTRADAS / DEVOLUCIONES</FilterChip>
                                                <FilterChip active={histDirectionFilter === 'salida'}  onClick={() => setHistDirectionFilter('salida')}  color="red">SALIDAS / PRÉSTAMOS</FilterChip>
                                            </div>
                                        </div>

                                        {/* Rango de fechas */}
                                        <div>
                                            <label className="text-[8px] font-black text-slate-400 ml-1">INTERVALO DE FECHA</label>
                                            <div className="grid grid-cols-2 gap-3 mt-2">
                                                <div className="space-y-1">
                                                    <label className="text-[8px] text-slate-400 ml-1 font-black">DESDE</label>
                                                    <input type="date" className="w-full p-3 bg-slate-50 rounded-xl text-[11px] font-black outline-none border-2 border-transparent focus:border-blue-100 normal-case"
                                                        style={{textTransform:'none'}} value={histDateFrom} onChange={e => setHistDateFrom(e.target.value)} />
                                                </div>
                                                <div className="space-y-1">
                                                    <label className="text-[8px] text-slate-400 ml-1 font-black">HASTA</label>
                                                    <input type="date" className="w-full p-3 bg-slate-50 rounded-xl text-[11px] font-black outline-none border-2 border-transparent focus:border-blue-100 normal-case"
                                                        style={{textTransform:'none'}} value={histDateTo} onChange={e => setHistDateTo(e.target.value)} />
                                                </div>
                                            </div>
                                            {(histDateFrom || histDateTo) && (
                                                <button type="button" onClick={() => { setHistDateFrom(''); setHistDateTo(''); }} className="mt-2 text-[9px] font-black text-slate-400 hover:text-red-500">× LIMPIAR FECHAS</button>
                                            )}
                                        </div>

                                        {/* Resumen + Exportar */}
                                        <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3 pt-2 border-t border-slate-100">
                                            <p className="text-[10px] font-black text-slate-500">
                                                {historyToShow.length} REGISTRO{historyToShow.length !== 1 ? 'S' : ''} ENCONTRADO{historyToShow.length !== 1 ? 'S' : ''}
                                            </p>
                                            <div className="flex gap-2 flex-wrap">
                                                <button type="button" onClick={exportHistoryPDF} className="flex items-center gap-2 bg-slate-900 text-white px-5 py-2.5 rounded-xl text-[9px] font-black tracking-widest hover:bg-slate-700 transition-colors">
                                                    <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                                                    PDF
                                                </button>
                                                <button type="button" onClick={exportHistoryExcel} className="flex items-center gap-2 bg-emerald-600 text-white px-5 py-2.5 rounded-xl text-[9px] font-black tracking-widest hover:bg-emerald-700 transition-colors">
                                                    <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                                                    EXCEL
                                                </button>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Lista de registros */}
                                    <div className="space-y-2.5">
                                        {historyToShow.length === 0 ? (
                                            <div className="text-center p-12 bg-white rounded-[2rem] border-2 border-dashed border-slate-100">
                                                <p className="text-[10px] font-black text-slate-300 tracking-widest">SIN REGISTROS ENCONTRADOS</p>
                                                <p className="text-[9px] text-slate-200 font-black mt-2">AJUSTE LOS FILTROS</p>
                                            </div>
                                        ) : historyToShow.map(h => (
                                            <div key={h.id} className={`bg-white p-5 rounded-[2.2rem] flex flex-col sm:flex-row justify-between items-center shadow-sm border-l-4 gap-3
                                                ${h.type?.includes('ENTRADA') || h.type?.includes('DEVOLUCION') ? 'border-l-emerald-500' : h.type?.includes('PRESTAMO') ? 'border-l-orange-500' : 'border-l-red-500'}`}>
                                                <div className="w-full">
                                                    <div className="font-black text-[12px] text-slate-800">{h.item || 'ÍTEM SIN NOMBRE'}</div>
                                                    <div className="text-[8px] font-black text-slate-400 mt-1">
                                                        TIPO: {(h.type?.replace(/_/g, ' ') || 'MOVIMIENTO')} | RESP: <span className="text-slate-900">{(h.tech || h.responsible || 'ALMACÉN').toUpperCase()}</span>
                                                    </div>
                                                    {h.supervisor && <div className="text-[8px] font-black text-orange-600 mt-0.5">AUTORIZÓ: {h.supervisor}</div>}
                                                    <div className="text-[8px] font-black text-blue-700 mt-0.5">ENTREGÓ (TURNO): {(h.monitor || 'N/A').toUpperCase()}</div>
                                                </div>
                                                <div className={`text-center sm:text-right shrink-0 px-4 py-2 rounded-2xl ${(h.type?.includes('ENTRADA') || h.type?.includes('DEVOLUCION')) ? 'bg-emerald-50' : 'bg-red-50'}`}>
                                                    <div className={`font-black text-sm italic ${(h.type?.includes('ENTRADA') || h.type?.includes('DEVOLUCION')) ? 'text-emerald-600' : 'text-red-600'}`}>
                                                        {(h.type?.includes('ENTRADA') || h.type?.includes('DEVOLUCION')) ? '+' : '-'}{h.qty || 0}
                                                    </div>
                                                    <div className="text-[8px] text-slate-400 font-black mt-0.5">{h.dateStr || 'FECHA DESCONOCIDA'}</div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* ════════════════════════════════ MAESTRO ═══════════════════════════════ */}
                            {activeTab === 'admin' && (
                                <div className="space-y-6">
                                    <div className="flex justify-center gap-2 bg-slate-100 p-1 rounded-2xl">
                                        {['material', 'tool', 'key'].map(type => (
                                            <button key={type} type="button" onClick={() => setAdminSection(type)}
                                                className={`flex-1 py-3 rounded-xl text-[10px] font-black transition-all ${adminSection === type ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-400'}`}>
                                                {type === 'material' ? 'MATERIAL' : type === 'tool' ? 'HERRAMIENTA' : 'LLAVE'}
                                            </button>
                                        ))}
                                    </div>
                                    {adminSection === 'material' && (
                                        <form onSubmit={handleAddItem} className="bg-white p-8 rounded-[2.5rem] shadow-premium space-y-5">
                                            <div className="text-center font-black text-slate-800 text-xs">NUEVO MATERIAL</div>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                <input required placeholder="CÓDIGO" className="w-full p-4 bg-slate-50 rounded-2xl text-[11px] font-black outline-none" value={newItem.id} onChange={e => setNewItem({ ...newItem, id: e.target.value.toUpperCase() })} />
                                                <input required placeholder="DESCRIPCIÓN" className="w-full p-4 bg-slate-50 rounded-2xl text-[11px] font-black outline-none" value={newItem.name} onChange={e => setNewItem({ ...newItem, name: e.target.value.toUpperCase() })} />
                                                <input required type="number" placeholder="STOCK INICIAL" className="w-full p-4 bg-slate-50 rounded-2xl text-[11px] font-black outline-none" value={newItem.stock} onChange={e => setNewItem({ ...newItem, stock: e.target.value })} />
                                                <input required placeholder="UNIDAD (PZA, MTS)" className="w-full p-4 bg-slate-50 rounded-2xl text-[11px] font-black outline-none" value={newItem.unit} onChange={e => setNewItem({ ...newItem, unit: e.target.value.toUpperCase() })} />
                                            </div>
                                            <button className="w-full bg-slate-900 text-white p-5 rounded-3xl font-black text-[11px] tracking-widest">GUARDAR</button>
                                        </form>
                                    )}
                                    {adminSection === 'tool' && (
                                        <form onSubmit={handleAddTool} className="bg-white p-8 rounded-[2.5rem] shadow-premium space-y-5">
                                            <div className="text-center font-black text-slate-800 text-xs">NUEVA HERRAMIENTA</div>
                                            <input required placeholder="CÓDIGO / SERIAL" className="w-full p-4 bg-slate-50 rounded-2xl text-[11px] font-black outline-none" value={newTool.id} onChange={e => setNewTool({ ...newTool, id: e.target.value.toUpperCase() })} />
                                            <input required placeholder="NOMBRE" className="w-full p-4 bg-slate-50 rounded-2xl text-[11px] font-black outline-none" value={newTool.name} onChange={e => setNewTool({ ...newTool, name: e.target.value.toUpperCase() })} />
                                            <div className="grid grid-cols-2 gap-4">
                                                <input placeholder="MARCA" className="w-full p-4 bg-slate-50 rounded-2xl text-[11px] font-black outline-none" value={newTool.brand} onChange={e => setNewTool({ ...newTool, brand: e.target.value.toUpperCase() })} />
                                                <input placeholder="MODELO/SERIAL" className="w-full p-4 bg-slate-50 rounded-2xl text-[11px] font-black outline-none" value={newTool.serial} onChange={e => setNewTool({ ...newTool, serial: e.target.value.toUpperCase() })} />
                                            </div>
                                            <button className="w-full bg-slate-900 text-white p-5 rounded-3xl font-black text-[11px] tracking-widest">REGISTRAR</button>
                                        </form>
                                    )}
                                    {adminSection === 'key' && (
                                        <form onSubmit={handleAddKey} className="bg-white p-8 rounded-[2.5rem] shadow-premium space-y-5">
                                            <div className="text-center font-black text-slate-800 text-xs">NUEVA LLAVE DE NODO</div>
                                            <input required placeholder="NOMBRE DEL NODO / SITIO" className="w-full p-4 bg-slate-50 rounded-2xl text-[11px] font-black outline-none" value={newKeyItem.name} onChange={e => setNewKeyItem({ name: e.target.value.toUpperCase() })} />
                                            <button className="w-full bg-slate-900 text-white p-5 rounded-3xl font-black text-[11px] tracking-widest">AGREGAR LLAVE</button>
                                        </form>
                                    )}
                                </div>
                            )}

                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
