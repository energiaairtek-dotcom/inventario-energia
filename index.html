<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Airtek - Gestión de Almacén Energía</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            letter-spacing: -0.01em;
            text-transform: uppercase;
        }
        
        .shadow-premium {
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
        }

        .tab-content {
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .pulse-online {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .4; }
        }

        input, select, textarea, option {
            text-transform: uppercase !important;
        }

        @media print {
            .no-print { display: none !important; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, updateDoc, deleteDoc, collection, query, onSnapshot, addDoc, serverTimestamp, writeBatch, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const myConfig = {
            apiKey: "AIzaSyDwaK4Z26RfqDwNvwdMqri08oEjwG9qymc",
            authDomain: "almacen-airtek.firebaseapp.com",
            projectId: "almacen-airtek",
            storageBucket: "almacen-airtek.firebasestorage.app",
            messagingSenderId: "934058211778",
            appId: "1:934058211778:web:6cc9d820c41fa90aa5fe5b"
        };

        window.__firebase_config_manual = JSON.stringify(myConfig);

        window.FirebaseSDK = {
            initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken,
            getFirestore, doc, setDoc, updateDoc, deleteDoc, collection, 
            query, onSnapshot, addDoc, serverTimestamp, writeBatch, getDoc
        };
        window.dispatchEvent(new Event('firebase-ready'));
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const EnergyLogo = ({ className = "h-8 w-8" }) => (
            <svg viewBox="0 0 24 24" fill="none" className={className} xmlns="http://www.w3.org/2000/svg">
                <path d="M13 2L3 14H12L11 22L21 10H12L13 2Z" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
        );

        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [isCloud, setIsCloud] = useState(false);
            const [inventory, setInventory] = useState([]);
            const [history, setHistory] = useState([]);
            const [tools, setTools] = useState([]);
            const [keys, setKeys] = useState([]);
            const [activeTab, setActiveTab] = useState('inventory');
            
            const [adminSection, setAdminSection] = useState('material'); 

            const [exitHeader, setExitHeader] = useState({ tech: '', monitor: '', supervisor: '', description: '' });
            const [currentSearch, setCurrentSearch] = useState('');
            const [toolSearch, setToolSearch] = useState('');
            const [showSearchList, setShowSearchList] = useState(false);
            const [selectedItems, setSelectedItems] = useState([]); 
            
            const [loaningTool, setLoaningTool] = useState(null);
            const [returningTool, setReturningTool] = useState(null); 
            const [loaningKey, setLoaningKey] = useState(null);
            const [loanData, setLoanData] = useState({ tech: '', supervisor: '', monitor: '' });
            const [returnData, setReturnData] = useState({ monitor: '' }); 

            const [filterItemId, setFilterItemId] = useState('all');
            
            const [newItem, setNewItem] = useState({ id: '', name: '', stock: '', min: 5, unit: 'PZA' });
            const [newTool, setNewTool] = useState({ id: '', name: '', brand: '', serial: '' });
            const [newKeyItem, setNewKeyItem] = useState({ name: '' });

            const [editingItem, setEditingItem] = useState(null);
            const [restockItem, setRestockItem] = useState(null);
            const [restockQty, setRestockQty] = useState('');
            const [restockResp, setRestockResp] = useState('');
            const [isAdminMode, setIsAdminMode] = useState(false);

            const dbRef = useRef(null);
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'airtek-energia-v1';
            
            const listaSupervisores = ["LUIS RAMOS", "DIEGO CHACÍN", "GUSTAVO RINCÓN"];
            const listadoNodos = ["COMEDOR", "LAGO CARIBE", "SANTA CRUZ", "POMONA", "TUNAS", "SAN RAFAEL", "MENE GRANDE", "LABORATORIO"];

            useEffect(() => {
                const init = async () => {
                    if (!window.FirebaseSDK) return;
                    const { initializeApp, getAuth, getFirestore, signInAnonymously, onAuthStateChanged, signInWithCustomToken, doc, getDoc, setDoc } = window.FirebaseSDK;
                    try {
                        const configStr = typeof __firebase_config !== 'undefined' ? __firebase_config : window.__firebase_config_manual;
                        const config = JSON.parse(configStr);
                        const app = initializeApp(config);
                        dbRef.current = getFirestore(app);
                        const auth = getAuth(app);
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }

                        for (const nodo of listadoNodos) {
                            const keyDocRef = doc(dbRef.current, 'artifacts', appId, 'public', 'data', 'keys_inventory', nodo);
                            const snap = await getDoc(keyDocRef);
                            if (!snap.exists()) {
                                await setDoc(keyDocRef, {
                                    name: nodo,
                                    status: 'DISPONIBLE',
                                    assignedTo: '',
                                    monitorTurno: '',
                                    lastMove: ''
                                });
                            }
                        }

                        const unsubscribe = onAuthStateChanged(auth, (u) => {
                            if (u) { setUser(u); setIsCloud(true); }
                            setLoading(false);
                        });
                        return unsubscribe;
                    } catch (e) { setLoading(false); }
                };
                window.addEventListener('firebase-ready', init);
                if (window.FirebaseSDK) init();
                return () => window.removeEventListener('firebase-ready', init);
            }, []);

            useEffect(() => {
                if (!user || !dbRef.current) return;
                const { collection, onSnapshot } = window.FirebaseSDK;
                const invPath = collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'inventory');
                const histPath = collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'history');
                const toolsPath = collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'tools_inventory');
                const keysPath = collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'keys_inventory');
                
                const unsubInv = onSnapshot(invPath, (snap) => setInventory(snap.docs.map(d => ({ ...d.data(), docId: d.id }))));
                const unsubHist = onSnapshot(histPath, (snap) => {
                    const data = snap.docs.map(d => ({ ...d.data(), id: d.id }));
                    data.sort((a,b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                    setHistory(data);
                });
                const unsubTools = onSnapshot(toolsPath, (snap) => setTools(snap.docs.map(d => ({ ...d.data(), docId: d.id }))));
                const unsubKeys = onSnapshot(keysPath, (snap) => setKeys(snap.docs.map(d => ({ ...d.data(), docId: d.id }))));
                
                return () => { unsubInv(); unsubHist(); unsubTools(); unsubKeys(); };
            }, [user, appId]);

            const sortedAndFilteredTools = useMemo(() => {
                let list = [...tools];
                list.sort((a, b) => (a.name || "").localeCompare(b.name || ""));
                if (toolSearch) {
                    const search = toolSearch.toLowerCase();
                    list = list.filter(t => (t.name || "").toLowerCase().includes(search) || (t.id || "").toLowerCase().includes(search));
                }
                return list;
            }, [tools, toolSearch]);

            const filteredInventorySearch = useMemo(() => {
                if (!currentSearch) return [];
                const search = currentSearch.toLowerCase();
                return inventory.filter(i => 
                    i.name.toLowerCase().includes(search) || 
                    i.id.toLowerCase().includes(search)
                ).slice(0, 5);
            }, [currentSearch, inventory]);

            const historyToShow = useMemo(() => {
                if (filterItemId === 'all') return history;
                return history.filter(h => h.itemId === filterItemId);
            }, [filterItemId, history]);

            // --- Handlers de Eliminación ---
            const deleteInventoryItem = async (docId, name) => {
                if(!confirm(`¿CONFIRMAR ELIMINACIÓN DE: ${name}?`)) return;
                const { doc, deleteDoc } = window.FirebaseSDK;
                try {
                    await deleteDoc(doc(dbRef.current, 'artifacts', appId, 'public', 'data', 'inventory', docId));
                } catch (err) { console.error(err); }
            };

            const deleteKey = async (docId, name) => {
                if(!confirm(`¿CONFIRMAR ELIMINACIÓN DE LLAVE: ${name}?`)) return;
                const { doc, deleteDoc } = window.FirebaseSDK;
                try {
                    await deleteDoc(doc(dbRef.current, 'artifacts', appId, 'public', 'data', 'keys_inventory', docId));
                } catch (err) { console.error(err); }
            };

            const deleteTool = async (docId, name) => {
                if(!confirm(`¿ELIMINAR HERRAMIENTA: ${name}?`)) return;
                const { doc, deleteDoc } = window.FirebaseSDK;
                try { await deleteDoc(doc(dbRef.current, 'artifacts', appId, 'public', 'data', 'tools_inventory', docId)); } catch (err) { console.error(err); }
            };

            // --- Handlers de Transacciones ---
            const handleToolLoan = async (e) => {
                e.preventDefault();
                if (!loaningTool) return;
                const { doc, updateDoc, addDoc, collection, serverTimestamp } = window.FirebaseSDK;
                const dateStr = new Date().toLocaleString().toUpperCase();
                try {
                    await updateDoc(doc(dbRef.current, 'artifacts', appId, 'public', 'data', 'tools_inventory', loaningTool.docId), {
                        status: 'PRESTADO',
                        assignedTo: loanData.tech.toUpperCase(),
                        supervisor: loanData.supervisor.toUpperCase(),
                        monitorTurno: loanData.monitor.toUpperCase(),
                        lastMove: dateStr
                    });
                    await addDoc(collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'history'), {
                        type: 'PRESTAMO_HERRAMIENTA',
                        item: (loaningTool.name || "S/N").toUpperCase(),
                        itemId: (loaningTool.id || "S/ID").toUpperCase(),
                        qty: 1,
                        tech: loanData.tech.toUpperCase(),
                        supervisor: loanData.supervisor.toUpperCase(),
                        monitor: loanData.monitor.toUpperCase(), 
                        dateStr: dateStr,
                        timestamp: serverTimestamp()
                    });
                    setLoaningTool(null); 
                    setLoanData({ tech: '', supervisor: '', monitor: '' });
                } catch (err) { console.error(err); }
            };

            const handleToolReturnSubmit = async (e) => {
                e.preventDefault();
                if(!returningTool) return;
                const { doc, updateDoc, addDoc, collection, serverTimestamp } = window.FirebaseSDK;
                const dateStr = new Date().toLocaleString().toUpperCase();
                try {
                    await updateDoc(doc(dbRef.current, 'artifacts', appId, 'public', 'data', 'tools_inventory', returningTool.docId), {
                        status: 'DISPONIBLE',
                        assignedTo: null,
                        supervisor: null,
                        monitorTurno: null,
                        lastMove: dateStr
                    });
                    await addDoc(collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'history'), {
                        type: 'DEVOLUCION_HERRAMIENTA',
                        item: (returningTool.name || "S/N").toUpperCase(),
                        itemId: (returningTool.id || "S/ID").toUpperCase(),
                        qty: 1,
                        tech: (returningTool.assignedTo || 'DESCONOCIDO').toUpperCase(),
                        monitor: returnData.monitor.toUpperCase(),
                        dateStr: dateStr,
                        timestamp: serverTimestamp()
                    });
                    setReturningTool(null);
                    setReturnData({ monitor: '' });
                } catch (err) { console.error(err); }
            };

            const handleKeyLoan = async (e) => {
                e.preventDefault();
                if (!loaningKey) return;
                const { doc, updateDoc, addDoc, collection, serverTimestamp } = window.FirebaseSDK;
                const dateStr = new Date().toLocaleString().toUpperCase();
                try {
                    await updateDoc(doc(dbRef.current, 'artifacts', appId, 'public', 'data', 'keys_inventory', loaningKey.docId), {
                        status: 'PRESTADO',
                        assignedTo: loanData.tech.toUpperCase(),
                        monitorTurno: loanData.monitor.toUpperCase(),
                        lastMove: dateStr
                    });
                    await addDoc(collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'history'), {
                        type: 'PRESTAMO_LLAVE',
                        item: `LLAVE NODO: ${loaningKey.name}`.toUpperCase(),
                        qty: 1,
                        tech: loanData.tech.toUpperCase(),
                        monitor: loanData.monitor.toUpperCase(), 
                        dateStr: dateStr,
                        timestamp: serverTimestamp()
                    });
                    setLoaningKey(null); 
                    setLoanData({ tech: '', supervisor: '', monitor: '' });
                } catch (err) { console.error(err); }
            };

            const handleReturnKey = async (key) => {
                if(!confirm(`¿CONFIRMAS LA DEVOLUCIÓN DE LA LLAVE: ${key.name}?`)) return;
                const { doc, updateDoc, addDoc, collection, serverTimestamp } = window.FirebaseSDK;
                const dateStr = new Date().toLocaleString().toUpperCase();
                try {
                    await updateDoc(doc(dbRef.current, 'artifacts', appId, 'public', 'data', 'keys_inventory', key.docId), {
                        status: 'DISPONIBLE',
                        assignedTo: '',
                        monitorTurno: '',
                        lastMove: dateStr
                    });
                    await addDoc(collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'history'), {
                        type: 'DEVOLUCION_LLAVE',
                        item: `LLAVE NODO: ${key.name}`.toUpperCase(),
                        qty: 1,
                        tech: (key.assignedTo || 'DESCONOCIDO').toUpperCase(),
                        monitor: 'ALMACÉN',
                        dateStr: dateStr,
                        timestamp: serverTimestamp()
                    });
                } catch (err) { console.error(err); }
            };

            const handleBulkExit = async (e) => {
                e.preventDefault();
                if (selectedItems.length === 0 || !exitHeader.monitor || !exitHeader.supervisor) return;
                const { doc, writeBatch, collection, serverTimestamp } = window.FirebaseSDK;
                const batch = writeBatch(dbRef.current);
                const dateStr = new Date().toLocaleString().toUpperCase();
                try {
                    selectedItems.forEach(item => {
                        const invDocRef = doc(dbRef.current, 'artifacts', appId, 'public', 'data', 'inventory', item.docId);
                        batch.update(invDocRef, { stock: item.stock - item.qty });
                        const histColRef = doc(collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'history'));
                        batch.set(histColRef, { 
                            type: 'SALIDA', 
                            tech: exitHeader.tech.toUpperCase(), 
                            supervisor: exitHeader.supervisor.toUpperCase(),
                            monitor: exitHeader.monitor.toUpperCase(), 
                            description: exitHeader.description.toUpperCase(), 
                            item: item.name.toUpperCase(), 
                            itemId: item.id.toUpperCase(), 
                            qty: item.qty, 
                            dateStr: dateStr, 
                            timestamp: serverTimestamp() 
                        });
                    });
                    await batch.commit(); 
                    setSelectedItems([]); 
                    setExitHeader({ tech: '', monitor: '', supervisor: '', description: '' }); 
                    setActiveTab('history');
                } catch (err) { console.error(err); }
            };

            // Helpers
            const addItemToExitList = (item) => { if (selectedItems.find(si => si.id === item.id)) return; setSelectedItems([...selectedItems, { ...item, qty: 1 }]); setCurrentSearch(''); setShowSearchList(false); };
            const removeSelected = (id) => setSelectedItems(selectedItems.filter(i => i.id !== id));
            const updateSelectedQty = (id, newQty) => setSelectedItems(selectedItems.map(i => i.id === id ? { ...i, qty: Math.max(1, Number(newQty)) } : i));
            const handleRestockSubmit = async (e) => { e.preventDefault(); if (!restockItem || !restockQty) return; const { doc, updateDoc, addDoc, collection, serverTimestamp } = window.FirebaseSDK; const qtyNum = Number(restockQty); const dateStr = new Date().toLocaleString().toUpperCase(); try { await updateDoc(doc(dbRef.current, 'artifacts', appId, 'public', 'data', 'inventory', restockItem.docId), { stock: restockItem.stock + qtyNum }); await addDoc(collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'history'), { type: 'ENTRADA', item: restockItem.name.toUpperCase(), itemId: restockItem.id.toUpperCase(), qty: qtyNum, responsible: restockResp.toUpperCase(), tech: 'ALMACÉN', monitor: restockResp.toUpperCase(), description: 'REPOSICIÓN DE STOCK', dateStr: dateStr, timestamp: serverTimestamp() }); setRestockItem(null); setRestockQty(''); setRestockResp(''); setActiveTab('history'); } catch (err) { console.error(err); } };

            // ─── FIX PRINCIPAL ──────────────────────────────────────────────────────────
            // Antes: solo hacía updateDoc sin registrar en bitácora.
            // Ahora: recibe el objeto completo del item, actualiza stock Y escribe
            // un registro en history con type ENTRADA o SALIDA según el modificador.
            const updateStock = async (item, mod) => {
                const { doc, updateDoc, addDoc, collection, serverTimestamp } = window.FirebaseSDK;
                const newStock = Math.max(0, item.stock + mod);
                const dateStr = new Date().toLocaleString().toUpperCase();
                try {
                    await updateDoc(
                        doc(dbRef.current, 'artifacts', appId, 'public', 'data', 'inventory', item.docId),
                        { stock: newStock }
                    );
                    await addDoc(
                        collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'history'),
                        {
                            type: mod > 0 ? 'ENTRADA' : 'SALIDA',
                            item: item.name.toUpperCase(),
                            itemId: item.id.toUpperCase(),
                            qty: Math.abs(mod),
                            tech: 'ALMACÉN',
                            monitor: 'AJUSTE MANUAL',
                            responsible: 'ALMACÉN',
                            description: mod > 0 ? 'AJUSTE MANUAL (+)' : 'AJUSTE MANUAL (-)',
                            dateStr: dateStr,
                            timestamp: serverTimestamp()
                        }
                    );
                } catch (err) { console.error(err); }
            };
            // ────────────────────────────────────────────────────────────────────────────

            const handleAddItem = async (e) => { e.preventDefault(); const { collection, addDoc, serverTimestamp } = window.FirebaseSDK; const dateStr = new Date().toLocaleString().toUpperCase(); try { await addDoc(collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'inventory'), { id: newItem.id.toUpperCase(), name: newItem.name.toUpperCase(), stock: Number(newItem.stock), min: Number(newItem.min), unit: newItem.unit.toUpperCase(), createdAt: serverTimestamp() }); if (Number(newItem.stock) > 0) { await addDoc(collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'history'), { type: 'ENTRADA', item: newItem.name.toUpperCase(), itemId: newItem.id.toUpperCase(), qty: Number(newItem.stock), responsible: 'ADMINISTRADOR', tech: 'ALMACÉN', monitor: 'CREACIÓN', description: 'INVENTARIO INICIAL', dateStr: dateStr, timestamp: serverTimestamp() }); } setNewItem({ id: '', name: '', stock: '', min: 5, unit: 'PZA' }); alert("Material registrado con éxito"); } catch (err) { console.error(err); } };
            const handleAddTool = async (e) => { e.preventDefault(); const { collection, addDoc, serverTimestamp } = window.FirebaseSDK; try { await addDoc(collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'tools_inventory'), { id: newTool.id.toUpperCase(), name: newTool.name.toUpperCase(), brand: newTool.brand.toUpperCase(), serial: newTool.serial.toUpperCase(), status: 'DISPONIBLE', createdAt: serverTimestamp() }); setNewTool({ id: '', name: '', brand: '', serial: '' }); alert("Herramienta registrada con éxito"); } catch (err) { console.error(err); } };
            const handleAddKey = async (e) => { e.preventDefault(); const { doc, setDoc, serverTimestamp } = window.FirebaseSDK; const keyName = newKeyItem.name.toUpperCase(); if(!keyName) return; try { await setDoc(doc(dbRef.current, 'artifacts', appId, 'public', 'data', 'keys_inventory', keyName), { name: keyName, status: 'DISPONIBLE', assignedTo: '', monitorTurno: '', lastMove: '', createdAt: serverTimestamp() }); setNewKeyItem({ name: '' }); alert("Llave de nodo registrada"); } catch (err) { console.error(err); } };
            const handleSaveEdit = async (e) => { e.preventDefault(); const { doc, updateDoc } = window.FirebaseSDK; try { await updateDoc(doc(dbRef.current, 'artifacts', appId, 'public', 'data', 'inventory', editingItem.docId), { name: editingItem.name.toUpperCase(), id: editingItem.id.toUpperCase(), min: Number(editingItem.min), unit: editingItem.unit.toUpperCase() }); setEditingItem(null); } catch (err) { console.error(err); } };
            const exportInventoryPDF = () => { const { jsPDF } = window.jspdf; const doc = new jsPDF(); doc.setFontSize(18); doc.text("AIRTEK ENERGÍA - REPORTE DE INVENTARIO", 14, 20); doc.setFontSize(10); doc.text(`GENERADO: ${new Date().toLocaleString().toUpperCase()}`, 14, 28); const tableData = inventory.map(i => [i.id.toUpperCase(), i.name.toUpperCase(), i.stock, i.unit.toUpperCase(), i.stock <= i.min ? 'CRÍTICO' : 'OK']); doc.autoTable({ startY: 35, head: [['CÓDIGO', 'ARTÍCULO', 'STOCK', 'UNIDAD', 'ESTADO']], body: tableData, headStyles: { fillColor: [37, 99, 235] }, styles: { textTransform: 'uppercase' } }); doc.save(`INVENTARIO_${new Date().toISOString().split('T')[0]}.pdf`); };
            const exportHistoryPDF = (filteredData = history, titleSuffix = "COMPLETA") => { const { jsPDF } = window.jspdf; const doc = new jsPDF(); doc.setFontSize(16); doc.text(`AIRTEK ENERGÍA - BITÁCORA ${titleSuffix}`, 14, 20); const tableData = filteredData.map(h => [(h.dateStr || "---").toUpperCase(), (h.item || "---").toUpperCase(), (h.type?.includes('ENTRADA') || h.type?.includes('DEVOLUCION')) ? `+${h.qty}` : `-${h.qty}`, String(h.tech || h.responsible || '---').toUpperCase(), h.type?.includes('PRESTAMO') ? String(h.supervisor || '---').toUpperCase() : (h.type === 'SALIDA' ? String(h.supervisor || '---').toUpperCase() : '---'), String(h.monitor || '---').toUpperCase()]); doc.autoTable({ startY: 35, head: [['FECHA', 'ARTÍCULO', 'CANT', 'RESPONSABLE', 'SUPERVISOR', 'MONITOREO']], body: tableData, headStyles: { fillColor: [37, 99, 235] }, styles: { fontSize: 7, textTransform: 'uppercase' } }); doc.save(`BITACORA_${titleSuffix}.pdf`); };

            if (loading) return <div className="h-screen flex flex-col items-center justify-center bg-white"><div className="text-blue-600 animate-bounce mb-4"><EnergyLogo className="h-16 w-16" /></div><p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">CONECTANDO...</p></div>;

            return (
                <div className="min-h-screen pb-20 no-print uppercase font-bold text-slate-900">
                    <header className="bg-white border-b border-slate-100 sticky top-0 z-50 px-6 py-4">
                        <div className="max-w-3xl mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <div className="bg-blue-600 text-white p-2 rounded-xl shadow-lg"><EnergyLogo className="h-7 w-7" /></div>
                                <div>
                                    <div className="flex items-center gap-2"><span className="text-lg font-black tracking-tighter uppercase">Airtek</span><span className="text-[10px] font-black bg-blue-100 text-blue-600 px-1.5 py-0.5 rounded tracking-tighter">ENERGÍA</span></div>
                                    <div className="flex items-center gap-1.5 mt-0.5"><span className={`w-1.5 h-1.5 rounded-full ${isCloud ? 'bg-emerald-500 pulse-online' : 'bg-red-500'}`}></span><p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">{isCloud ? 'ONLINE' : 'OFFLINE'}</p></div>
                                </div>
                            </div>
                            <button onClick={() => setIsAdminMode(!isAdminMode)} className={`text-[9px] px-2 py-1 rounded-full font-black tracking-wider transition-colors ${isAdminMode ? 'bg-slate-800 text-white' : 'bg-slate-100 text-slate-400'}`}>{isAdminMode ? 'MODO EDITOR' : 'VISTA LECTURA'}</button>
                        </div>
                    </header>

                    <div className="max-w-3xl mx-auto p-4 space-y-6 mt-4">
                        <nav className="flex gap-1.5 bg-white p-1.5 rounded-3xl shadow-premium border border-slate-100 overflow-x-auto no-scrollbar">
                            {[
                                {id: 'inventory', label: 'MATERIALES'}, {id: 'exit', label: 'DESPACHO'}, 
                                {id: 'tools', label: 'HERRAMIENTAS'}, {id: 'keys', label: 'LLAVES'}, {id: 'history', label: 'BITÁCORA'},
                                {id: 'admin', label: 'MAESTRO'}
                            ].map(t => (
                                <button key={t.id} onClick={() => setActiveTab(t.id)} className={`flex-1 min-w-[95px] py-3 rounded-2xl font-black text-[10px] tracking-wider transition-all ${activeTab === t.id ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-400 hover:text-blue-50'}`}>{t.label}</button>
                            ))}
                        </nav>

                        <main className="tab-content">
                            {loaningTool && (<div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[100] flex items-center justify-center p-4"><form onSubmit={handleToolLoan} className="bg-white w-full max-w-md rounded-[2.5rem] p-8 space-y-4 shadow-2xl"><div className="text-center mb-4"><h3 className="text-sm font-black uppercase text-orange-500">PRESTAR HERRAMIENTA</h3><p className="text-[11px] font-black text-slate-800 mt-1">{loaningTool.name}</p></div><div className="space-y-4"><input required className="w-full p-4 bg-slate-50 rounded-2xl text-[12px] font-black border-2 border-transparent focus:border-blue-500 outline-none" value={loanData.tech} onChange={e=>setLoanData({...loanData, tech: e.target.value})} placeholder="TÉCNICO QUE RECIBE" /><select required className="w-full p-4 bg-slate-50 rounded-2xl text-[11px] font-black border-2 border-transparent focus:border-blue-500 outline-none" value={loanData.supervisor} onChange={e=>setLoanData({...loanData, supervisor: e.target.value})}><option value="">SUPERVISOR...</option>{listaSupervisores.map(s => <option key={s} value={s}>{s}</option>)}</select><input required className="w-full p-4 bg-slate-50 rounded-2xl text-[12px] font-black border-2 border-transparent focus:border-blue-500 outline-none" value={loanData.monitor} onChange={e=>setLoanData({...loanData, monitor: e.target.value})} placeholder="MONITOREO ENTREGA" /></div><div className="flex gap-3 pt-6"><button type="button" onClick={()=>setLoaningTool(null)} className="flex-1 py-4 text-[10px] text-slate-400 font-black">CANCELAR</button><button type="submit" className="flex-2 bg-orange-500 text-white px-8 py-4 rounded-2xl font-black text-[10px] uppercase shadow-lg shadow-orange-200">CONFIRMAR</button></div></form></div>)}
                            {returningTool && (<div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[100] flex items-center justify-center p-4"><form onSubmit={handleToolReturnSubmit} className="bg-white w-full max-w-md rounded-[2.5rem] p-8 space-y-4 shadow-2xl"><div className="text-center mb-4"><h3 className="text-sm font-black uppercase text-emerald-500">DEVOLUCIÓN</h3><p className="text-[11px] font-black text-slate-800 mt-1">{returningTool.name}</p></div><div className="space-y-2"><p className="text-[10px] font-black text-slate-400 uppercase text-center">TÉCNICO QUE DEVUELVE: <span className="text-slate-900">{returningTool.assignedTo}</span></p><input required className="w-full p-4 bg-emerald-50 rounded-2xl text-[12px] font-black border-2 border-emerald-100 focus:border-emerald-500 outline-none text-slate-800" value={returnData.monitor} onChange={e=>setReturnData({...returnData, monitor: e.target.value})} placeholder="QUIÉN RECIBE (MONITOR)" /></div><div className="flex gap-3 pt-6"><button type="button" onClick={()=>setReturningTool(null)} className="flex-1 py-4 text-[10px] text-slate-400 font-black">CANCELAR</button><button type="submit" className="flex-2 bg-emerald-500 text-white px-8 py-4 rounded-2xl font-black text-[10px] uppercase shadow-lg shadow-emerald-200">CONFIRMAR INGRESO</button></div></form></div>)}
                            {loaningKey && (<div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[100] flex items-center justify-center p-4"><form onSubmit={handleKeyLoan} className="bg-white w-full max-w-md rounded-[2.5rem] p-8 space-y-4 shadow-2xl"><div className="text-center mb-4"><h3 className="text-sm font-black uppercase text-blue-600">ENTREGAR LLAVE DE NODO</h3><p className="text-[11px] font-black text-slate-800 mt-1">{loaningKey.name}</p></div><div className="space-y-4"><input required className="w-full p-4 bg-slate-50 rounded-2xl text-[12px] font-black border-2 border-transparent focus:border-blue-500 outline-none" value={loanData.tech} onChange={e=>setLoanData({...loanData, tech: e.target.value})} placeholder="TÉCNICO QUE RECIBE" /><input required className="w-full p-4 bg-slate-50 rounded-2xl text-[12px] font-black border-2 border-transparent focus:border-blue-500 outline-none" value={loanData.monitor} onChange={e=>setLoanData({...loanData, monitor: e.target.value})} placeholder="NOMBRE MONITOREO" /></div><div className="flex gap-3 pt-6"><button type="button" onClick={()=>setLoaningKey(null)} className="flex-1 py-4 text-[10px] text-slate-400 font-black">CANCELAR</button><button type="submit" className="flex-2 bg-blue-600 text-white px-8 py-4 rounded-2xl font-black text-[10px] shadow-lg">CONFIRMAR</button></div></form></div>)}
                            {restockItem && (<div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[100] flex items-center justify-center p-4"><form onSubmit={handleRestockSubmit} className="bg-white w-full max-w-md rounded-[2.5rem] p-8 space-y-4"><div className="text-center font-black text-emerald-600 text-xs">REPONER: {restockItem.name}</div><input required type="number" min="1" className="w-full p-4 bg-emerald-50 rounded-2xl text-[14px] font-black text-center outline-none" value={restockQty} onChange={e=>setRestockQty(e.target.value)} placeholder="CANTIDAD" /><input required className="w-full p-4 bg-slate-50 rounded-2xl text-[11px] font-black outline-none" value={restockResp} onChange={e=>setRestockResp(e.target.value)} placeholder="RESPONSABLE" /><div className="flex gap-3 pt-4"><button type="button" onClick={()=>{setRestockItem(null); setRestockQty('');}} className="flex-1 text-[10px]">CANCELAR</button><button type="submit" className="flex-2 bg-emerald-500 text-white px-8 py-4 rounded-2xl font-black text-[10px]">REPOSICIÓN</button></div></form></div>)}
                            {editingItem && (<div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[100] flex items-center justify-center p-4"><form onSubmit={handleSaveEdit} className="bg-white w-full max-w-md rounded-[2.5rem] p-8 space-y-4 shadow-2xl"><div className="text-center font-black text-xs">EDITAR MATERIAL</div><input required className="w-full p-4 bg-slate-50 rounded-2xl text-[11px] font-bold outline-none uppercase" value={editingItem.name} onChange={e=>setEditingItem({...editingItem, name: e.target.value.toUpperCase()})} /><div className="grid grid-cols-2 gap-4"><input required className="w-full p-4 bg-slate-50 rounded-2xl text-[11px] font-bold outline-none uppercase" value={editingItem.id} onChange={e=>setEditingItem({...editingItem, id: e.target.value.toUpperCase()})} /><input required type="number" className="w-full p-4 bg-slate-50 rounded-2xl text-[11px] font-bold outline-none" value={editingItem.min} onChange={e=>setEditingItem({...editingItem, min: e.target.value})} /></div><div className="flex gap-3 pt-4"><button type="button" onClick={()=>setEditingItem(null)} className="flex-1 text-[10px]">CANCELAR</button><button type="submit" className="flex-2 bg-blue-600 text-white px-8 py-4 rounded-2xl font-black text-[10px]">ACTUALIZAR</button></div></form></div>)}

                            {activeTab === 'inventory' && (
                                <div className="space-y-3">
                                    <div className="flex justify-between items-center px-4"><h2 className="text-[10px] font-black text-slate-400 tracking-widest uppercase">EXISTENCIAS</h2><button onClick={exportInventoryPDF} className="bg-slate-900 text-white px-4 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest flex items-center gap-2">EXPORTAR PDF</button></div>
                                    {inventory.map(i => (
                                        <div key={i.docId} className="bg-white p-5 rounded-[2rem] flex flex-col sm:flex-row justify-between items-center shadow-sm border border-slate-100">
                                            <div className="flex items-center gap-4 w-full sm:w-auto">
                                                {isAdminMode && (<button onClick={() => deleteInventoryItem(i.docId, i.name)} className="p-3 bg-red-50 text-red-400 rounded-xl hover:bg-red-100"><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg></button>)}
                                                <button onClick={() => setEditingItem(i)} className="p-3 bg-slate-50 text-slate-400 rounded-xl hover:text-blue-500"><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg></button>
                                                <div className="flex flex-col"><span className="font-black text-[13px] text-slate-800">{i.name}</span><span className="text-[9px] text-slate-400 font-mono font-bold">{i.id}</span></div>
                                            </div>
                                            {/* ─── BOTONES + y - ahora llaman a updateStock(item, mod) ─── */}
                                            <div className="flex items-center gap-4 bg-slate-50 p-1.5 rounded-2xl mt-3 sm:mt-0">
                                                <button type="button" onClick={() => updateStock(i, -1)} className="w-9 h-9 flex items-center justify-center bg-white rounded-xl text-slate-400 hover:text-red-500 transition-colors">-</button>
                                                <div className="px-4 text-center min-w-[70px]"><div className={`font-black text-lg ${i.stock <= i.min ? 'text-red-500' : 'text-slate-900'}`}>{i.stock}</div><div className="text-[8px] text-slate-300 font-extrabold">{i.unit}</div></div>
                                                <button type="button" onClick={() => updateStock(i, 1)} className="w-9 h-9 flex items-center justify-center bg-white rounded-xl text-slate-400 hover:text-emerald-500 transition-colors">+</button>
                                                <button type="button" onClick={() => setRestockItem(i)} className="px-4 py-2 bg-white rounded-xl font-black text-[10px] text-emerald-500 uppercase flex items-center gap-2">REPONER</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {activeTab === 'exit' && (
                                <form onSubmit={handleBulkExit} className="bg-white p-8 rounded-[2.5rem] shadow-premium border border-slate-100 space-y-6">
                                    <div className="text-center uppercase"><h3 className="text-sm font-black text-slate-800">CARGA DE DESPACHO</h3></div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="space-y-1"><label className="text-[8px] text-slate-400 ml-2 uppercase font-black">TÉCNICO RESPONSABLE</label><input required className="w-full p-4 bg-slate-50 rounded-2xl text-[11px] font-black outline-none border-2 border-transparent focus:border-blue-100" value={exitHeader.tech} onChange={e=>setExitHeader({...exitHeader, tech: e.target.value.toUpperCase()})} placeholder="NOMBRE" /></div>
                                        <div className="space-y-1"><label className="text-[8px] text-slate-400 ml-2 uppercase font-black">TURNO MONITOREO</label><input required className="w-full p-4 bg-slate-50 rounded-2xl text-[11px] font-black outline-none border-2 border-transparent focus:border-blue-100" value={exitHeader.monitor} onChange={e=>setExitHeader({...exitHeader, monitor: e.target.value.toUpperCase()})} placeholder="QUIÉN DESPACHA" /></div>
                                    </div>
                                    <div className="space-y-1"><label className="text-[8px] text-slate-400 ml-2 uppercase font-black">SUPERVISOR AUTORIZA</label><select required className="w-full p-4 bg-slate-50 rounded-2xl text-[11px] font-black border-2 border-transparent outline-none focus:border-blue-100 appearance-none" value={exitHeader.supervisor} onChange={e=>setExitHeader({...exitHeader, supervisor: e.target.value})}><option value="">SELECCIONAR...</option>{listaSupervisores.map(s => <option key={s} value={s}>{s}</option>)}</select></div>
                                    <div className="relative"><label className="text-[8px] text-slate-400 ml-2 uppercase font-black">BUSCAR MATERIAL</label><input className="w-full p-4 bg-slate-50 rounded-2xl text-[11px] font-black outline-none" value={currentSearch} onFocus={() => setShowSearchList(true)} onChange={e => {setCurrentSearch(e.target.value); setShowSearchList(true);}} placeholder="ESCRIBA PARA BUSCAR..." />{showSearchList && (<div className="absolute top-full left-0 right-0 mt-2 bg-white rounded-2xl shadow-2xl border z-50 overflow-hidden">{filteredInventorySearch.filter(i => (i.name || "").toLowerCase().includes(currentSearch.toLowerCase())).slice(0, 5).map(i => (<div key={i.id} onClick={() => addItemToExitList(i)} className="p-4 hover:bg-blue-50 cursor-pointer flex justify-between items-center border-b last:border-0"><div className="text-[11px] font-black">{i.name}</div><div className="text-[10px] text-blue-600">EN STOCK: {i.stock}</div></div>))}</div>)}</div>
                                    <div className="space-y-2">{selectedItems.map(item => (<div key={item.id} className="bg-slate-50 p-4 rounded-2xl flex items-center justify-between"><div className="text-[11px] font-black truncate max-w-[150px]">{item.name}</div><div className="flex items-center gap-2"><input type="number" className="w-16 p-2 bg-white rounded-xl text-[11px] font-black text-center" value={item.qty} onChange={e => updateSelectedQty(item.id, e.target.value)} min="1" /><button type="button" onClick={() => setSelectedItems(selectedItems.filter(si => si.id !== item.id))} className="text-red-400 px-2 font-black">×</button></div></div>))}</div>
                                    <div className="space-y-1"><label className="text-[8px] text-slate-400 ml-2 uppercase font-black">NODO / OBSERVACIÓN</label><input required className="w-full p-4 bg-slate-50 rounded-2xl text-[11px] font-black outline-none" value={exitHeader.description} onChange={e=>setExitHeader({...exitHeader, description: e.target.value.toUpperCase()})} placeholder="DETALLES DE SALIDA" /></div>
                                    <button disabled={selectedItems.length === 0} className="w-full bg-blue-600 disabled:bg-slate-200 text-white p-5 rounded-3xl font-black text-[11px] tracking-widest">GENERAR DESPACHO</button>
                                </form>
                            )}

                            {activeTab === 'tools' && (
                                <div className="space-y-6">
                                    <div className="flex flex-col gap-4 px-4"><h2 className="text-[10px] font-black text-slate-400 tracking-widest uppercase">LISTADO DE HERRAMIENTAS</h2><div className="relative"><input className="w-full p-4 bg-white rounded-2xl text-[11px] font-black shadow-sm border border-slate-100 outline-none uppercase" value={toolSearch} onChange={e => setToolSearch(e.target.value)} placeholder="BUSCAR POR NOMBRE O CÓDIGO..." /></div></div>
                                    <div className="space-y-3">{sortedAndFilteredTools.map(t => (
                                        <div key={t.docId} className={`bg-white p-5 rounded-[2rem] flex flex-col sm:flex-row justify-between items-center shadow-sm border ${t.status === 'PRESTADO' ? 'border-orange-200 bg-orange-50/30' : 'border-slate-100'}`}>
                                            <div className="flex items-center gap-4"><div className={`p-3 rounded-xl ${t.status === 'PRESTADO' ? 'bg-orange-100 text-orange-500' : 'bg-emerald-100 text-emerald-500'}`}><EnergyLogo className="w-5 h-5" /></div><div className="flex flex-col"><span className="font-black text-[13px] text-slate-800">{t.name}</span><span className="text-[9px] text-slate-400 font-mono">{t.id}</span>{t.status === 'PRESTADO' && <span className="text-[9px] font-black text-orange-500 mt-1">ASIGNADO A: {t.assignedTo}</span>}</div></div>
                                            <div className="flex items-center gap-2 mt-3 sm:mt-0">{t.status === 'DISPONIBLE' ? <button onClick={() => setLoaningTool(t)} className="px-6 py-3 bg-slate-900 text-white rounded-xl text-[10px] uppercase tracking-widest font-black">PRESTAR</button> : <button onClick={() => setReturningTool(t)} className="px-6 py-3 bg-white border-2 border-orange-500 text-orange-500 rounded-xl text-[10px] uppercase tracking-widest font-black">DEVOLVER</button>}{isAdminMode && <button onClick={() => deleteTool(t.docId, t.name)} className="p-3 bg-red-50 text-red-400 rounded-xl">×</button>}</div>
                                        </div>
                                    ))}</div>
                                </div>
                            )}

                            {activeTab === 'keys' && (
                                <div className="space-y-3">
                                    <div className="px-4"><h2 className="text-[10px] font-black text-slate-400 tracking-widest uppercase">LLAVES DE NODOS</h2></div>
                                    <div className="grid grid-cols-1 gap-3">
                                        {keys.sort((a,b)=>a.name.localeCompare(b.name)).map(k => (
                                            <div key={k.docId} className={`bg-white p-5 rounded-[2rem] shadow-sm border flex flex-col sm:flex-row justify-between items-center gap-4 ${k.status === 'PRESTADO' ? 'border-blue-200 bg-blue-50/20' : 'border-slate-100'}`}>
                                                <div className="flex items-center gap-4 w-full">
                                                    <div className={`p-4 rounded-2xl ${k.status === 'PRESTADO' ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-400'}`}><svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3m-3-3l-2.5-2.5" /></svg></div>
                                                    <div><div className="text-[13px] font-black">{k.name}</div>{k.status === 'PRESTADO' ? (<div className="mt-1 space-y-0.5"><div className="text-[9px] text-blue-600 font-black">EN POSESIÓN DE: {k.assignedTo}</div><div className="text-[8px] text-slate-400 font-bold">ENTREGADO POR: {k.monitorTurno}</div></div>) : (<div className="text-[9px] text-emerald-500 font-black tracking-widest">DISPONIBLE</div>)}</div>
                                                </div>
                                                <div className="shrink-0 w-full sm:w-auto flex items-center gap-2">
                                                    {k.status === 'DISPONIBLE' ? (
                                                        <button onClick={() => setLoaningKey(k)} className="w-full sm:w-auto px-6 py-3 bg-slate-900 text-white rounded-xl text-[10px] font-black">ENTREGAR</button>
                                                    ) : (
                                                        <button onClick={() => handleReturnKey(k)} className="w-full sm:w-auto px-6 py-3 bg-white border-2 border-blue-600 text-blue-600 rounded-xl text-[10px] font-black">RECIBIR LLAVE</button>
                                                    )}
                                                    {isAdminMode && <button onClick={() => deleteKey(k.docId, k.name)} className="p-3 bg-red-50 text-red-400 rounded-xl">×</button>}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {activeTab === 'admin' && (
                                <div className="space-y-6">
                                    <div className="flex justify-center gap-2 bg-slate-100 p-1 rounded-2xl">
                                        {['material', 'tool', 'key'].map(type => (
                                            <button key={type} onClick={() => setAdminSection(type)} className={`flex-1 py-3 rounded-xl text-[10px] font-black transition-all ${adminSection === type ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-400'}`}>
                                                {type === 'material' ? 'MATERIAL' : type === 'tool' ? 'HERRAMIENTA' : 'LLAVE'}
                                            </button>
                                        ))}
                                    </div>
                                    {adminSection === 'material' && (<form onSubmit={handleAddItem} className="bg-white p-8 rounded-[2.5rem] shadow-premium space-y-5"><div className="text-center font-black text-slate-800 text-xs">NUEVO MATERIAL</div><div className="grid grid-cols-1 md:grid-cols-2 gap-4"><input required placeholder="CÓDIGO" className="w-full p-4 bg-slate-50 rounded-2xl text-[11px] font-black outline-none" value={newItem.id} onChange={e=>setNewItem({...newItem, id: e.target.value.toUpperCase()})} /><input required placeholder="DESCRIPCIÓN" className="w-full p-4 bg-slate-50 rounded-2xl text-[11px] font-black outline-none" value={newItem.name} onChange={e=>setNewItem({...newItem, name: e.target.value.toUpperCase()})} /><input required type="number" placeholder="STOCK" className="w-full p-4 bg-slate-50 rounded-2xl text-[11px] font-black outline-none" value={newItem.stock} onChange={e=>setNewItem({...newItem, stock: e.target.value})} /><input required placeholder="UNIDAD (PZA, MTS)" className="w-full p-4 bg-slate-50 rounded-2xl text-[11px] font-black outline-none" value={newItem.unit} onChange={e=>setNewItem({...newItem, unit: e.target.value.toUpperCase()})} /></div><button className="w-full bg-slate-900 text-white p-5 rounded-3xl font-black uppercase text-[11px] tracking-widest">GUARDAR</button></form>)}
                                    {adminSection === 'tool' && (<form onSubmit={handleAddTool} className="bg-white p-8 rounded-[2.5rem] shadow-premium space-y-5"><div className="text-center font-black text-slate-800 text-xs">NUEVA HERRAMIENTA</div><input required placeholder="CÓDIGO / SERIAL" className="w-full p-4 bg-slate-50 rounded-2xl text-[11px] font-black outline-none" value={newTool.id} onChange={e=>setNewTool({...newTool, id: e.target.value.toUpperCase()})} /><input required placeholder="NOMBRE" className="w-full p-4 bg-slate-50 rounded-2xl text-[11px] font-black outline-none" value={newTool.name} onChange={e=>setNewTool({...newTool, name: e.target.value.toUpperCase()})} /><div className="grid grid-cols-2 gap-4"><input placeholder="MARCA" className="w-full p-4 bg-slate-50 rounded-2xl text-[11px] font-black outline-none" value={newTool.brand} onChange={e=>setNewTool({...newTool, brand: e.target.value.toUpperCase()})} /><input placeholder="MODELO/SERIAL" className="w-full p-4 bg-slate-50 rounded-2xl text-[11px] font-black outline-none" value={newTool.serial} onChange={e=>setNewTool({...newTool, serial: e.target.value.toUpperCase()})} /></div><button className="w-full bg-slate-900 text-white p-5 rounded-3xl font-black uppercase text-[11px] tracking-widest">REGISTRAR</button></form>)}
                                    {adminSection === 'key' && (<form onSubmit={handleAddKey} className="bg-white p-8 rounded-[2.5rem] shadow-premium space-y-5"><div className="text-center font-black text-slate-800 text-xs">NUEVA LLAVE DE NODO</div><input required placeholder="NOMBRE DEL NODO / SITIO" className="w-full p-4 bg-slate-50 rounded-2xl text-[11px] font-black outline-none" value={newKeyItem.name} onChange={e=>setNewKeyItem({name: e.target.value.toUpperCase()})} /><button className="w-full bg-slate-900 text-white p-5 rounded-3xl font-black uppercase text-[11px] tracking-widest">AGREGAR LLAVE</button></form>)}
                                </div>
                            )}

                            {activeTab === 'history' && (
                                <div className="space-y-4">
                                    <div className="bg-white p-6 rounded-[2.5rem] shadow-sm flex flex-col sm:flex-row gap-4 border border-slate-100">
                                        <div className="flex-1 space-y-1"><label className="text-[9px] font-black text-blue-600 uppercase ml-2 tracking-widest">FILTRO POR MATERIAL</label><select className="w-full p-3 bg-slate-50 rounded-xl text-[10px] font-black border-none outline-none appearance-none uppercase" value={filterItemId} onChange={e => setFilterItemId(e.target.value)}><option value="all">TODOS LOS MOVIMIENTOS</option>{inventory.map(i => <option key={i.id} value={i.id}>{i.name.toUpperCase()}</option>)}</select></div>
                                        <div className="flex items-end"><button onClick={() => exportHistoryPDF(historyToShow, filterItemId === 'all' ? 'COMPLETA' : `DE ${filterItemId}`)} className="bg-slate-900 text-white px-6 py-3 rounded-xl text-[9px] font-black uppercase tracking-widest hover:bg-slate-800 transition-colors">EXPORTAR PDF</button></div>
                                    </div>
                                    <div className="space-y-2.5">
                                        {historyToShow.length === 0 ? (<div className="text-center p-12 bg-white rounded-[2rem] border-2 border-dashed border-slate-100"><p className="text-[10px] font-black text-slate-300 uppercase tracking-widest">SIN REGISTROS ENCONTRADOS</p></div>) : (historyToShow.map(h => (<div key={h.id} className={`bg-white p-5 rounded-[2.2rem] flex flex-col sm:flex-row justify-between items-center shadow-sm border-l-4 ${h.type?.includes('ENTRADA') || h.type?.includes('DEVOLUCION') ? 'border-l-emerald-500' : (h.type?.includes('PRESTAMO') ? 'border-l-orange-500' : 'border-l-red-500')} gap-3`}><div className="w-full"><div className="font-black text-[12px] text-slate-800 uppercase">{(h.item || "ÍTEM SIN NOMBRE")}</div><div className="text-[8px] font-black text-slate-400 uppercase mt-1">TIPO: {h.type?.replace(/_/g,' ') || 'MOVIMIENTO'} | RESP: <span className="text-slate-900">{(h.tech || h.responsible || "ALMACÉN").toUpperCase()}</span></div>{h.supervisor && <div className="text-[8px] font-black text-orange-600 mt-1 uppercase">AUTORIZÓ: {h.supervisor}</div>}<div className="text-[8px] font-black text-blue-700 mt-0.5 uppercase">ENTREGÓ (TURNO): {(h.monitor || "N/A").toUpperCase()}</div></div><div className={`text-center sm:text-right shrink-0 px-4 py-2 rounded-2xl ${(h.type?.includes('ENTRADA') || h.type?.includes('DEVOLUCION')) ? 'bg-emerald-50' : 'bg-red-50'}`}><div className={`${(h.type?.includes('ENTRADA') || h.type?.includes('DEVOLUCION')) ? 'text-emerald-600' : 'text-red-600'} font-black text-sm italic tracking-tighter`}>{(h.type?.includes('ENTRADA') || h.type?.includes('DEVOLUCION')) ? '+' : '-'}{h.qty || 0}</div><div className="text-[8px] text-slate-400 font-black mt-0.5">{(h.dateStr || "FECHA DESCONOCIDA")}</div></div></div>)))}
                                    </div>
                                </div>
                            )}
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
